apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- namespace.yaml
- crd
- rbac
- service.yaml
- audit-service.yaml
- deployment.yaml
- certs
- webhook
images:
- name: gitops-reverser
  newName: gitops-reverser
  newTag: e2e-local
replacements:
- source:
    fieldPath: metadata.namespace
    kind: ServiceAccount
    name: gitops-reverser
  targets:
  - fieldPaths:
    - metadata.name
    select:
      kind: Namespace
      name: sut
  - fieldPaths:
    - subjects.0.namespace
    select:
      kind: ClusterRoleBinding
      name: gitops-reverser
  - fieldPaths:
    - spec.dnsNames.0
    - spec.dnsNames.1
    options:
      delimiter: .
      index: 1
    select:
      kind: Certificate
      name: gitops-reverser-audit-server-cert
  - fieldPaths:
    - spec.dnsNames.0
    - spec.dnsNames.1
    options:
      delimiter: .
      index: 1
    select:
      kind: Certificate
      name: gitops-reverser-admission-server-cert
  - fieldPaths:
    - metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: /
      index: 0
    select:
      kind: ValidatingWebhookConfiguration
      name: gitops-reverser-validating-webhook
  - fieldPaths:
    - webhooks.0.clientConfig.service.namespace
    select:
      kind: ValidatingWebhookConfiguration
      name: gitops-reverser-validating-webhook
namespace: gitops-reverser
