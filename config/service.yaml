apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: gitops-reverser
  name: gitops-reverser-service
  namespace: sut
spec:
  type: ClusterIP
  ports:
  - name: metrics
    port: 8443
    protocol: TCP
    targetPort: 8443
  - name: webhook
    port: 9443
    protocol: TCP
    targetPort: 9443
  selector:
    app.kubernetes.io/name: gitops-reverser
    control-plane: gitops-reverser
