apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: gitops-reverser
  name: gitops-reverser-service
  namespace: sut
spec:
  clusterIP: 10.43.200.200    # k3d/k3s service CIDR; kube-apiserver needs a fixed address before CoreDNS is available
  ports:
  - name: admission
    port: 9443
    protocol: TCP
    targetPort: 9443
  - name: audit
    port: 9444
    protocol: TCP
    targetPort: 9444
  - name: metrics
    port: 8443
    protocol: TCP
    targetPort: 8443
  selector:
    app.kubernetes.io/name: gitops-reverser
    control-plane: gitops-reverser
