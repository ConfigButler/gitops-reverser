# CommitRequest is a one-shot "save" signal. Creating one finalizes the open
# commit window for the referenced GitTarget immediately, instead of waiting
# for the rolling silence timer. The resulting commit SHA is reported in
# .status once the object's own audit event has been processed.
#
# Frontends typically use metadata.generateName so each "save" is a fresh
# object. The referenced GitTarget must live in the same namespace.
apiVersion: configbutler.ai/v1alpha2
kind: CommitRequest
metadata:
  generateName: save-
  namespace: default
spec:
  gitTargetRef:
    name: quickstart-gittarget
  # Optional commit message (1-1024 Unicode characters). Newlines are allowed
  # for a subject plus body; other control characters are rejected. When
  # omitted, the generated grouped-commit message is used.
  message: "Increase checkout API memory after load-test failures"
