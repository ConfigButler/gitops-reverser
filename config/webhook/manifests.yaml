---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-configbutler-ai-v1alpha1-gittarget
  failurePolicy: Fail
  name: vgittarget.kb.io
  rules:
  - apiGroups:
    - configbutler.ai
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - gittargets
  sideEffects: None
