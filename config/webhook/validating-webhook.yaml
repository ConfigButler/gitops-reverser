apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  annotations:
    cert-manager.io/inject-ca-from: sut/gitops-reverser-admission-server-cert
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: gitops-reverser
  name: gitops-reverser-validating-webhook
# This ValidatingWebhookConfiguration is part of the kustomize SUT overlay (config/).
# It carries two webhooks served by the one admission server (port 9443, gated behind
# --admission-webhook):
#
#   1. validate-all.configbutler.ai — the broad '*' observer below. E2E-ONLY:
#      it is intentionally NOT packaged in the Helm chart. The handler always allows
#      (pure observation, see internal/webhook/admission_allow_handler.go); when a real,
#      rejecting policy becomes product behavior, the chart must gain matching packaging
#      and this note must change.
#   2. validate-operator-types.configbutler.ai — captures the submitter of our own command
#      kinds (a CommitRequest today) at admission. This one IS product behavior and is
#      packaged in the chart (charts/.../templates/validate-operator-types-webhook.yaml); the
#      entry here is the e2e SUT's copy. See
#      docs/spec/commitrequest-admission-authorship.md §4.
#
# The cert-manager.io/inject-ca-from annotation injects the admission server CA bundle
# for every webhook in this configuration.
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: gitops-reverser-service
      namespace: sut
      path: /validate-all
      port: 9443
  # Ignore (not Fail) is mandatory while this matches '*': the webhook backend is
  # the gitops-reverser pod itself, so a Fail policy on core resources would
  # deadlock the cluster at bootstrap (the apiserver could not admit the pod that
  # serves the webhook). When a real, rejecting policy lands, switch to Fail only
  # together with a namespaceSelector that excludes kube-system and this pod's own
  # namespace.
  failurePolicy: Ignore
  matchPolicy: Equivalent
  name: validate-all.configbutler.ai
  # Broad match for TESTING and as the future-policy extension point: observe
  # writes to all real (top-level) resources, mirroring the intent of the audit
  # capture policy (test/e2e/cluster/audit/policy.yaml). Two honest gaps vs that
  # policy:
  #   * A ValidatingWebhookConfiguration matches by inclusion only — it cannot
  #     express "everything EXCEPT events/pods/leases/...", so this set is a
  #     superset of the audit set. The handler always allows, so the extra
  #     matches are harmless (just more requests observed).
  #   * resources: ['*'] is top-level only and deliberately excludes subresources,
  #     mirroring the audit policy dropping */status and apps/*/scale noise.
  rules:
  - apiGroups:
    - '*'
    apiVersions:
    - '*'
    operations:
    - CREATE
    - UPDATE
    - DELETE
    resources:
    - '*'
    scope: '*'
  sideEffects: None
  # 1s, not the apiserver max of 30s. failurePolicy is Ignore, so on a slow or
  # unreachable backend the request is admitted anyway after the timeout — a
  # large value only adds latency to every cluster write, it buys no safety.
  timeoutSeconds: 1
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: gitops-reverser-service
      namespace: sut
      path: /validate-operator-types
      port: 9443
  # Ignore, not Fail: a missed author capture must degrade to the committer, never
  # reject a user's CommitRequest. The handler also returns Allowed even when the Redis
  # write errors, so the command's success never depends on this webhook at all —
  # Ignore only covers the webhook being entirely unreachable.
  failurePolicy: Ignore
  matchPolicy: Equivalent
  name: validate-operator-types.configbutler.ai
  # Narrow: only our own command kinds (one rule per command kind). The submitter is
  # captured into the command-author Redis corner and read back by the CommitRequest
  # controller with no wait.
  rules:
  - apiGroups:
    - configbutler.ai
    apiVersions:
    - v1alpha3
    operations:
    - CREATE
    resources:
    - commitrequests
    scope: Namespaced
  # Redis write on real requests; nothing on dry-run (the handler honors NoneOnDryRun).
  sideEffects: NoneOnDryRun
  timeoutSeconds: 2
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: gitops-reverser-service
      namespace: sut
      path: /validate-gittarget-kubeconfig
      port: 9443
  # Fail (not Ignore): this guard closes the confused-deputy escalation the config-plane
  # split opens (a tenant naming a kubeconfig Secret they cannot read). A missed check would
  # silently admit that escalation, so it must fail closed. It is safe to fail closed here —
  # unlike validate-all, this matches only configbutler.ai/gittargets, never core resources,
  # so a webhook-down state blocks GitTarget writes but can never deadlock cluster bootstrap.
  failurePolicy: Fail
  matchPolicy: Equivalent
  name: validate-gittarget-kubeconfig.configbutler.ai
  # Only GitTarget CREATE/UPDATE — the spec.kubeConfig.secretRef reference is immutable, but
  # UPDATE is guarded too so it cannot be set on a later edit without the same authorization.
  rules:
  - apiGroups:
    - configbutler.ai
    apiVersions:
    - v1alpha3
    operations:
    - CREATE
    - UPDATE
    resources:
    - gittargets
    scope: Namespaced
  # The SubjectAccessReview it issues is a read on the authorization API — no cluster state
  # changes, so there are no side effects on any request, dry-run or not.
  sideEffects: None
  timeoutSeconds: 5
