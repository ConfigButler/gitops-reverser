apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: gitops-reverser
    app.kubernetes.io/part-of: gitops-reverser
    control-plane: gitops-reverser
  name: gitops-reverser
  namespace: sut
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gitops-reverser
      control-plane: gitops-reverser
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/name: gitops-reverser
        control-plane: gitops-reverser
    spec:
      containers:
      - args:
        - --metrics-bind-address=:8443
        - --metrics-insecure
        - --health-probe-bind-address=:8081
        - --admission-webhook-enabled
        - --admission-webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
        - --audit-cert-path=/tmp/k8s-audit-server/audit-server-certs
        - --audit-client-ca-path=/tmp/k8s-audit-server/audit-client-ca
        - --audit-redis-addr=valkey.valkey-e2e.svc.cluster.local:6379
        # Dev/e2e only: the in-cluster Gitea SSH host key is not pinned, so permit SSH
        # when no known_hosts source exists. Never set this in production.
        - --insecure-allow-missing-known-hosts
        command:
        - /manager
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: valkey-auth
              key: password
        # Integration-coverage output dir. Harmless for a non-instrumented image
        # (the runtime ignores it); a -cover build writes counters here on exit,
        # collected by `task e2e-coverage-collect`. e2e/dev overlay only.
        - name: GOCOVERDIR
          value: /var/gocoverage
        image: gitops-reverser:latest
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 9444
          name: audit
          protocol: TCP
        - containerPort: 9443
          name: webhook
          protocol: TCP
        - containerPort: 8443
          name: metrics
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 1000m
            memory: 1Gi
          requests:
            cpu: 10m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /tmp
          name: tmp-dir
        - mountPath: /tmp/k8s-audit-server/audit-server-certs
          name: audit-webhook-certs
          readOnly: true
        - mountPath: /tmp/k8s-audit-server/audit-client-ca
          name: audit-client-ca
          readOnly: true
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: admission-webhook-certs
          readOnly: true
        - mountPath: /var/gocoverage
          name: gocoverage
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: gitops-reverser
      terminationGracePeriodSeconds: 10
      volumes:
      - emptyDir: {}
        name: tmp-dir
      - name: audit-webhook-certs
        secret:
          secretName: audit-server-cert
      - name: audit-client-ca
        secret:
          secretName: gitops-reverser-audit-root-ca
      - name: admission-webhook-certs
        secret:
          secretName: admission-server-cert
      # Coverage output for a -cover image (GOCOVERDIR). emptyDir keeps the
      # pod compliant with the restricted PodSecurity profile; it survives a
      # container restart, so `task e2e-coverage-collect` flushes by signalling
      # the manager (it exits, the runtime writes counters, the kubelet restarts
      # it) and then streams the files out. Unused by a non-instrumented image.
      - name: gocoverage
        emptyDir: {}
