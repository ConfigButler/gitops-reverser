apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - sa.yaml
  - role.yaml
  # The wildcard read a WatchRule may need, kept out of role.yaml so it can be dropped whole.
  # See docs/rbac.md; the Helm chart gates the same pair on `rbac.watchAnyResource`.
  - watch-any-resource-role.yaml
  - watch-any-resource-rolebinding.yaml
  - cluster-role-jane-aggregated.yaml
  - cluster-rolebinding.yaml
  - cluster-rolebinding-jane.yaml   # E2E-only helper: allows impersonated user jane@acme.com writes in tests.
  - cluster-rolebinding-jane-aggregated.yaml
