---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: gittargets.configbutler.ai
spec:
  group: configbutler.ai
  names:
    kind: GitTarget
    listKind: GitTargetList
    plural: gittargets
    singular: gittarget
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.providerRef.name
      name: Provider
      type: string
    - jsonPath: .spec.branch
      name: Branch
      type: string
    - jsonPath: .spec.path
      name: Path
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].reason
      name: Reason
      type: string
    - jsonPath: .status.streams.summary
      name: Streams
      type: string
    - jsonPath: .status.conditions[?(@.type=="GitPathAccepted")].status
      name: GitPathAccepted
      priority: 1
      type: string
    - jsonPath: .status.conditions[?(@.type=="RenderMatchesLive")].status
      name: RenderMatchesLive
      priority: 1
      type: string
    - jsonPath: .status.conditions[?(@.type=="StreamsRunning")].status
      name: StreamsRunning
      priority: 1
      type: string
    - jsonPath: .status.conditions[?(@.type=="SourceClusterReachable")].reason
      name: SourceReachable
      priority: 1
      type: string
    - jsonPath: .status.conditions[?(@.type=="GitProviderReady")].status
      name: ProviderReady
      priority: 1
      type: string
    - jsonPath: .status.conditions[?(@.type=="ClusterProviderReady")].status
      name: ClusterProviderReady
      priority: 1
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].message
      name: Status
      priority: 1
      type: string
    - jsonPath: .spec.encryption.provider
      name: Encryption
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha3
    schema:
      openAPIV3Schema:
        description: GitTarget is the Schema for the gittargets API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of GitTarget
            properties:
              allowedSourceNamespaces:
                description: "AllowedSourceNamespaces bounds which SOURCE-cluster
                  namespaces may be mirrored INTO this\ntarget. It is a property of
                  the DESTINATION, not of any requesting rule: when declared it is\nexhaustive
                  for every WatchRule that writes here.\n\nThe invariant everything
                  else serves — a declared policy is exhaustive:\n\n\t| declared?
                  | a WatchRule item may watch                            |\n\t| no
                  \       | the WatchRule's own namespace only (legacy)           |\n\t|
                  yes       | exactly what the policy admits, and nothing else      |\n\nIt
                  is also what a rules[].sourceNamespace of \"*\" resolves THROUGH:\n\n\t|
                  policy                       | \"*\" resolves to                                     |\n\t|
                  undeclared                   | denied — deny-by-default; \"*\" is
                  not a backdoor     |\n\t| {} (declared, empty)         | nothing
                  \                                            |\n\t| names: [a, b]
                  \               | exactly a and b, with no source-cluster access
                  \     |\n\t| selector: {matchLabels: …}   | every source namespace
                  carrying those labels, live  |\n\t| selector: {}                 |
                  EVERY source namespace — the \"all namespaces\" form  |\n\nThe last
                  row is the deliberate \"all source namespaces\" declaration, and
                  it is the\nreplacement for the removed cluster-wide namespaced ClusterWatchRule:
                  declared by the\ndestination owner rather than by the rule author,
                  legible here, and self-updating as\nnamespaces come and go.\n\nThere
                  is deliberately NO self-namespace exception. Once a policy is declared
                  it must admit\nevery namespace that may reach this target, INCLUDING
                  a co-resident legacy WatchRule's own\nnamespace. An implicit carve-out
                  would mean the field does not actually bound what arrives\nhere,
                  so a reader auditing it would be wrong about the target's contents
                  — which is the\nwhole reason the field exists. The resulting authoring
                  footgun (adding a policy for one\noverride silently denies co-resident
                  legacy rules) is mitigated by being LOUD:\nSourceNamespaceAuthorized=False,
                  Stalled=True, and a message naming the exact fix.\n\nIts selector
                  matches labels on Namespaces in the SOURCE cluster this target mirrors
                  from —\nnot the control cluster ClusterProvider.allowedNamespaces
                  describes. Evaluating it therefore\nneeds Namespace get/list/watch
                  for the identity in that cluster's credential; an\nexact-NAMES entry
                  stays usable without it, which is a deliberate degradation path
                  that also\nkeeps \"*\" resolvable against a names-only policy.\n\nEmpty
                  or omitted are NOT the same: omitted declares no policy (a WatchRule
                  keeps its own\nnamespace), while a declared-but-empty policy admits
                  nothing. Naming any namespace other\nthan the WatchRule's own —
                  including \"*\" — additionally requires the ClusterProvider to set\nspec.allowSourceNamespaceOverride.\n\nIt
                  does NOT bound ClusterWatchRule. Cluster-scoped objects have no
                  namespace, so a\nClusterWatchRule is intentionally cluster-global
                  and this field is neither consulted nor a\nbound for it; isolating
                  cluster-scoped objects between tenants takes separate source\ncredentials/ClusterProviders."
                properties:
                  names:
                    description: Names is an explicit allow-list of namespace names.
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: set
                  selector:
                    description: |-
                      Selector is a label selector matched against Namespace labels; a namespace whose labels
                      match is admitted. ORed with Names.
                    properties:
                      matchExpressions:
                        description: matchExpressions is a list of label selector
                          requirements. The requirements are ANDed.
                        items:
                          description: |-
                            A label selector requirement is a selector that contains values, a key, and an operator that
                            relates the key and values.
                          properties:
                            key:
                              description: key is the label key that the selector
                                applies to.
                              type: string
                            operator:
                              description: |-
                                operator represents a key's relationship to a set of values.
                                Valid operators are In, NotIn, Exists and DoesNotExist.
                              type: string
                            values:
                              description: |-
                                values is an array of string values. If the operator is In or NotIn,
                                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                the values array must be empty. This array is replaced during a strategic
                                merge patch.
                              items:
                                type: string
                              type: array
                              x-kubernetes-list-type: atomic
                          required:
                          - key
                          - operator
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: |-
                          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                          map is equivalent to an element of matchExpressions, whose key field is "key", the
                          operator is "In", and the values array contains only "value". The requirements are ANDed.
                        type: object
                    type: object
                    x-kubernetes-map-type: atomic
                type: object
              branch:
                description: |-
                  Branch to use for this target.
                  Must be one of the allowed branches in the provider.
                  Immutable: delete and recreate the GitTarget to change its destination.
                minLength: 1
                type: string
              clusterProviderRef:
                default:
                  name: default
                description: |-
                  ClusterProviderRef names the SOURCE cluster this GitTarget mirrors FROM, by referencing a
                  cluster-scoped ClusterProvider by name. The ClusterProvider is the home for that cluster's
                  connectivity credential, namespace-access authorization, and author-attribution mode. This
                  DEFAULTS to {name: "default"} — a user-created provider by that conventional name, which may
                  be in-cluster or remote — so a target that omits it persists with a concrete, jumpable ref
                  rather than an implicit nil. The operator never creates that provider; a GitTarget naming one
                  that does not exist is held unready. Immutable: a folder's source cluster is part of what the
                  folder means; delete and recreate to change it.
                properties:
                  group:
                    default: configbutler.ai
                    description: API Group of the referent.
                    enum:
                    - configbutler.ai
                    type: string
                  kind:
                    default: ClusterProvider
                    description: |-
                      Kind of the referent.
                      Optional because this reference currently only supports a single kind (ClusterProvider).
                    enum:
                    - ClusterProvider
                    type: string
                  name:
                    description: Name of the referent.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              encryption:
                description: Encryption defines encryption settings for Secret resource
                  writes.
                properties:
                  age:
                    description: Age configures age-specific encryption behavior for
                      SOPS.
                    properties:
                      enabled:
                        default: false
                        description: Enabled toggles age-based recipient resolution
                          and bootstrap behavior.
                        type: boolean
                      recipients:
                        description: Recipients defines how recipients are resolved.
                        properties:
                          extractFromSecret:
                            default: false
                            description: ExtractFromSecret derives recipients from
                              all *.agekey entries in encryption.secretRef.
                            type: boolean
                          generateWhenMissing:
                            default: false
                            description: GenerateWhenMissing creates a date-named
                              *.agekey entry in encryption.secretRef when no *.agekey
                              exists.
                            type: boolean
                          publicKeys:
                            description: PublicKeys is a static list of age recipients
                              (age1...).
                            items:
                              minLength: 1
                              type: string
                            type: array
                        type: object
                    type: object
                  provider:
                    default: sops
                    description: Provider selects the encryption provider.
                    enum:
                    - sops
                    type: string
                  secretRef:
                    description: SecretRef references namespace-local Secret data
                      used by the encryption provider.
                    properties:
                      group:
                        default: ""
                        description: Group of the referent.
                        type: string
                      kind:
                        default: Secret
                        description: Kind of the referent.
                        enum:
                        - Secret
                        type: string
                      name:
                        description: Name of the Secret.
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                required:
                - provider
                type: object
              path:
                description: |-
                  Path within the repository to write resources to, relative to the repository
                  root. Required and must be non-empty — there is no default, so a GitTarget can
                  never silently write to the repository root. To deliberately target the
                  repository root, set it to "." (the ArgoCD/Flux convention); an empty string is
                  rejected because it is too easy to leave blank by accident to be a deliberate
                  root choice. Any leading slash (absolute path) and ".." are rejected, and a
                  trailing slash is normalized away.
                  Immutable: delete and recreate the GitTarget to change its destination.
                minLength: 1
                type: string
              placement:
                description: |-
                  Placement declares where NEW resources are written. It has no effect on a
                  resource that already has a document in Git — that document is always
                  updated in place at its existing location, wherever that is. Mutable: a
                  change only affects resources created after the change.
                properties:
                  byType:
                    additionalProperties:
                      type: string
                    description: |-
                      ByType maps an exact resource type key ("{group}/{version}/{resource}", e.g.
                      "v1/configmaps", "apps/v1/deployments", or "v1/secrets"; core resources omit
                      the group) to the path template used for a new resource of that type. A path
                      selected for a sensitive resource (Secrets, plus any operator-configured
                      sensitive type) must be identity-complete so it cannot collide two distinct
                      sensitive resources onto one file.
                    type: object
                  default:
                    description: |-
                      Default is the path template used for a new resource whose type has no ByType
                      entry. Omitted, it falls through to sibling-layout inference and then the
                      built-in canonical path. A bundling default (one that is not identity-complete,
                      such as "all.yaml") is only valid when a sensitive resource can never reach it
                      — give every sensitive type an explicit identity-complete ByType entry.
                    type: string
                type: object
              providerRef:
                description: |-
                  ProviderRef references the GitProvider that backs this target.
                  Immutable: delete and recreate the GitTarget to change its destination.
                properties:
                  group:
                    default: configbutler.ai
                    description: API Group of the referent.
                    enum:
                    - configbutler.ai
                    type: string
                  kind:
                    default: GitProvider
                    description: |-
                      Kind of the referent.
                      Optional because this reference currently only supports a single kind (GitProvider).
                      Keeping it optional allows users to omit it while still benefiting from CRD defaulting.
                    enum:
                    - GitProvider
                    type: string
                  name:
                    description: Name of the referent.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
            required:
            - branch
            - path
            - providerRef
            type: object
            x-kubernetes-validations:
            - message: spec.providerRef is immutable; delete and recreate the GitTarget
                to change its destination
              rule: self.providerRef == oldSelf.providerRef
            - message: spec.branch is immutable; delete and recreate the GitTarget
                to change its destination
              rule: self.branch == oldSelf.branch
            - message: spec.path is immutable; delete and recreate the GitTarget to
                change its destination
              rule: self.path == oldSelf.path
            - message: spec.clusterProviderRef is immutable; delete and recreate the
                GitTarget to change the cluster it mirrors
              rule: self.clusterProviderRef == oldSelf.clusterProviderRef
          status:
            description: status defines the observed state of GitTarget
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of an object's state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastPushTime:
                description: LastPushTime is the timestamp of the last successful
                  push.
                format: date-time
                type: string
              lastReconcileTime:
                description: LastReconcileTime is the timestamp of the most recent
                  reconcile attempt.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the latest generation observed
                  by the controller.
                format: int64
                type: integer
              streams:
                description: |-
                  Streams is the bounded data-plane roll-up over this GitTarget's tracked types.
                  Counts, never a per-type list, so it stays bounded however many types are watched.
                properties:
                  blocked:
                    description: Blocked is how many tracked types cannot currently
                      be watched.
                    format: int32
                    type: integer
                  observedTime:
                    description: ObservedTime is when this roll-up was last computed.
                    format: date-time
                    type: string
                  ready:
                    description: Ready is how many tracked types are Streaming.
                    format: int32
                    type: integer
                  replaying:
                    description: Replaying is how many tracked types are still replaying
                      their initial events.
                    format: int32
                    type: integer
                  summary:
                    description: Summary is the display-only ready/total ratio.
                    type: string
                  total:
                    description: Total is how many types this target tracks.
                    format: int32
                    type: integer
                required:
                - blocked
                - ready
                - replaying
                - total
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
