---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: gittargets.configbutler.ai
spec:
  group: configbutler.ai
  names:
    kind: GitTarget
    listKind: GitTargetList
    plural: gittargets
    singular: gittarget
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.providerRef.name
      name: Provider
      type: string
    - jsonPath: .spec.branch
      name: Branch
      type: string
    - jsonPath: .spec.path
      name: Path
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].reason
      name: Reason
      type: string
    - jsonPath: .status.streams.summary
      name: Streams
      type: string
    - jsonPath: .status.conditions[?(@.type=="GitPathAccepted")].status
      name: GitPathAccepted
      priority: 1
      type: string
    - jsonPath: .status.conditions[?(@.type=="RenderMatchesLive")].status
      name: RenderMatchesLive
      priority: 1
      type: string
    - jsonPath: .status.conditions[?(@.type=="StreamsRunning")].status
      name: StreamsRunning
      priority: 1
      type: string
    - jsonPath: .status.conditions[?(@.type=="SourceClusterReachable")].reason
      name: SourceReachable
      priority: 1
      type: string
    - jsonPath: .status.conditions[?(@.type=="GitProviderReady")].status
      name: ProviderReady
      priority: 1
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].message
      name: Status
      priority: 1
      type: string
    - jsonPath: .spec.encryption.provider
      name: Encryption
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha3
    schema:
      openAPIV3Schema:
        description: GitTarget is the Schema for the gittargets API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of GitTarget
            properties:
              branch:
                description: |-
                  Branch to use for this target.
                  Must be one of the allowed branches in the provider.
                  Immutable: delete and recreate the GitTarget to change its destination.
                minLength: 1
                type: string
              encryption:
                description: Encryption defines encryption settings for Secret resource
                  writes.
                properties:
                  age:
                    description: Age configures age-specific encryption behavior for
                      SOPS.
                    properties:
                      enabled:
                        default: false
                        description: Enabled toggles age-based recipient resolution
                          and bootstrap behavior.
                        type: boolean
                      recipients:
                        description: Recipients defines how recipients are resolved.
                        properties:
                          extractFromSecret:
                            default: false
                            description: ExtractFromSecret derives recipients from
                              all *.agekey entries in encryption.secretRef.
                            type: boolean
                          generateWhenMissing:
                            default: false
                            description: GenerateWhenMissing creates a date-named
                              *.agekey entry in encryption.secretRef when no *.agekey
                              exists.
                            type: boolean
                          publicKeys:
                            description: PublicKeys is a static list of age recipients
                              (age1...).
                            items:
                              minLength: 1
                              type: string
                            type: array
                        type: object
                    type: object
                  provider:
                    default: sops
                    description: Provider selects the encryption provider.
                    enum:
                    - sops
                    type: string
                  secretRef:
                    description: SecretRef references namespace-local Secret data
                      used by the encryption provider.
                    properties:
                      group:
                        default: ""
                        description: Group of the referent.
                        type: string
                      kind:
                        default: Secret
                        description: Kind of the referent.
                        enum:
                        - Secret
                        type: string
                      name:
                        description: Name of the Secret.
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                required:
                - provider
                type: object
              kubeConfig:
                description: |-
                  KubeConfig names the SOURCE CLUSTER this GitTarget mirrors FROM: the kubeconfig
                  determines both the cluster and the credentials to reach it. Omitted means the cluster
                  the operator runs in, the single-cluster default that behaves exactly as before. Its
                  Secret is read from the GitTarget's OWN namespace, on the cluster the operator runs in —
                  the credential for a cluster never has to live on that cluster. When SecretRef.Key is
                  empty the resolver reads "value" then "value.yaml" (Flux's order). Immutable: the source
                  of a folder's content is part of what the folder means; delete and recreate to change it.
                  Only kubeConfig.secretRef is honored in v1alpha3 (configMapRef is rejected at admission);
                  unsafe kubeconfigs (exec auth providers, insecure-skip-tls-verify) are rejected by the
                  controller with a legible Validated=False reason unless the operator opts in via flags.
                properties:
                  configMapRef:
                    description: |-
                      ConfigMapRef holds an optional name of a ConfigMap that contains
                      the following keys:

                      - `provider`: the provider to use. One of `aws`, `azure`, `gcp`, or
                         `generic`. Required.
                      - `cluster`: the fully qualified resource name of the Kubernetes
                         cluster in the cloud provider API. Not used by the `generic`
                         provider. Required when one of `address` or `ca.crt` is not set.
                      - `address`: the address of the Kubernetes API server. Required
                         for `generic`. For the other providers, if not specified, the
                         first address in the cluster resource will be used, and if
                         specified, it must match one of the addresses in the cluster
                         resource.
                         If audiences is not set, will be used as the audience for the
                         `generic` provider.
                      - `ca.crt`: the optional PEM-encoded CA certificate for the
                         Kubernetes API server. If not set, the controller will use the
                         CA certificate from the cluster resource.
                      - `audiences`: the optional audiences as a list of
                         line-break-separated strings for the Kubernetes ServiceAccount
                         token. Defaults to the `address` for the `generic` provider, or
                         to specific values for the other providers depending on the
                         provider.
                      -  `serviceAccountName`: the optional name of the Kubernetes
                         ServiceAccount in the same namespace that should be used
                         for authentication. If not specified, the controller
                         ServiceAccount will be used.

                      Mutually exclusive with SecretRef.
                    properties:
                      name:
                        description: Name of the referent.
                        type: string
                    required:
                    - name
                    type: object
                  secretRef:
                    description: |-
                      SecretRef holds an optional name of a secret that contains a key with
                      the kubeconfig file as the value. If no key is set, the key will default
                      to 'value'. Mutually exclusive with ConfigMapRef.
                      It is recommended that the kubeconfig is self-contained, and the secret
                      is regularly updated if credentials such as a cloud-access-token expire.
                      Cloud specific `cmd-path` auth helpers will not function without adding
                      binaries and credentials to the Pod that is responsible for reconciling
                      Kubernetes resources. Supported only for the generic provider.
                    properties:
                      key:
                        description: Key in the Secret, when not specified an implementation-specific
                          default key is used.
                        type: string
                      name:
                        description: Name of the Secret.
                        type: string
                    required:
                    - name
                    type: object
                type: object
                x-kubernetes-validations:
                - message: exactly one of spec.kubeConfig.configMapRef or spec.kubeConfig.secretRef
                    must be specified
                  rule: has(self.configMapRef) || has(self.secretRef)
                - message: exactly one of spec.kubeConfig.configMapRef or spec.kubeConfig.secretRef
                    must be specified
                  rule: '!has(self.configMapRef) || !has(self.secretRef)'
              path:
                description: |-
                  Path within the repository to write resources to, relative to the repository
                  root. Required and must be non-empty — there is no default, so a GitTarget can
                  never silently write to the repository root. To deliberately target the
                  repository root, set it to "." (the ArgoCD/Flux convention); an empty string is
                  rejected because it is too easy to leave blank by accident to be a deliberate
                  root choice. Any leading slash (absolute path) and ".." are rejected, and a
                  trailing slash is normalized away.
                  Immutable: delete and recreate the GitTarget to change its destination.
                minLength: 1
                type: string
              placement:
                description: |-
                  Placement declares where NEW resources are written. It has no effect on a
                  resource that already has a document in Git — that document is always
                  updated in place at its existing location, wherever that is. Mutable: a
                  change only affects resources created after the change.
                properties:
                  byType:
                    additionalProperties:
                      type: string
                    description: |-
                      ByType maps an exact resource type key ("{group}/{version}/{resource}", e.g.
                      "v1/configmaps", "apps/v1/deployments", or "v1/secrets"; core resources omit
                      the group) to the path template used for a new resource of that type. A path
                      selected for a sensitive resource (Secrets, plus any operator-configured
                      sensitive type) must be identity-complete so it cannot collide two distinct
                      sensitive resources onto one file.
                    type: object
                  default:
                    description: |-
                      Default is the path template used for a new resource whose type has no ByType
                      entry. Omitted, it falls through to sibling-layout inference and then the
                      built-in canonical path. A bundling default (one that is not identity-complete,
                      such as "all.yaml") is only valid when a sensitive resource can never reach it
                      — give every sensitive type an explicit identity-complete ByType entry.
                    type: string
                type: object
              providerRef:
                description: |-
                  ProviderRef references the GitProvider that backs this target.
                  Immutable: delete and recreate the GitTarget to change its destination.
                properties:
                  group:
                    default: configbutler.ai
                    description: API Group of the referent.
                    enum:
                    - configbutler.ai
                    type: string
                  kind:
                    default: GitProvider
                    description: |-
                      Kind of the referent.
                      Optional because this reference currently only supports a single kind (GitProvider).
                      Keeping it optional allows users to omit it while still benefiting from CRD defaulting.
                    enum:
                    - GitProvider
                    type: string
                  name:
                    description: Name of the referent.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
            required:
            - branch
            - path
            - providerRef
            type: object
            x-kubernetes-validations:
            - message: spec.providerRef is immutable; delete and recreate the GitTarget
                to change its destination
              rule: self.providerRef == oldSelf.providerRef
            - message: spec.branch is immutable; delete and recreate the GitTarget
                to change its destination
              rule: self.branch == oldSelf.branch
            - message: spec.path is immutable; delete and recreate the GitTarget to
                change its destination
              rule: self.path == oldSelf.path
            - message: spec.kubeConfig is immutable; delete and recreate the GitTarget
                to change the cluster it mirrors
              rule: has(self.kubeConfig) == has(oldSelf.kubeConfig) && (!has(self.kubeConfig)
                || self.kubeConfig == oldSelf.kubeConfig)
            - message: spec.kubeConfig.configMapRef (provider auth) is not yet supported;
                use secretRef
              rule: '!has(self.kubeConfig) || !has(self.kubeConfig.configMapRef)'
          status:
            description: status defines the observed state of GitTarget
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of an object's state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastPushTime:
                description: LastPushTime is the timestamp of the last successful
                  push.
                format: date-time
                type: string
              lastReconcileTime:
                description: LastReconcileTime is the timestamp of the most recent
                  reconcile attempt.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the latest generation observed
                  by the controller.
                format: int64
                type: integer
              streams:
                description: |-
                  Streams is the bounded data-plane roll-up over this GitTarget's tracked types.
                  Counts, never a per-type list, so it stays bounded however many types are watched.
                properties:
                  blocked:
                    description: Blocked is how many tracked types cannot currently
                      be watched.
                    format: int32
                    type: integer
                  observedTime:
                    description: ObservedTime is when this roll-up was last computed.
                    format: date-time
                    type: string
                  ready:
                    description: Ready is how many tracked types are Streaming.
                    format: int32
                    type: integer
                  replaying:
                    description: Replaying is how many tracked types are still replaying
                      their initial events.
                    format: int32
                    type: integer
                  summary:
                    description: Summary is the display-only ready/total ratio.
                    type: string
                  total:
                    description: Total is how many types this target tracks.
                    format: int32
                    type: integer
                required:
                - blocked
                - ready
                - replaying
                - total
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
