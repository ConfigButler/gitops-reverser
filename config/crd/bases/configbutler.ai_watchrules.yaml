---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: watchrules.configbutler.ai
spec:
  group: configbutler.ai
  names:
    kind: WatchRule
    listKind: WatchRuleList
    plural: watchrules
    singular: watchrule
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.targetRef.name
      name: Target
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].reason
      name: Reason
      type: string
    - jsonPath: .status.streams.summary
      name: Streams
      type: string
    - jsonPath: .status.conditions[?(@.type=="GitTargetReady")].status
      name: GitTargetReady
      priority: 1
      type: string
    - jsonPath: .status.conditions[?(@.type=="StreamsRunning")].status
      name: StreamsRunning
      priority: 1
      type: string
    - jsonPath: .status.conditions[?(@.type=="SourceNamespaceAuthorized")].status
      name: SourceAuthorized
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha3
    schema:
      openAPIV3Schema:
        description: |-
          WatchRule selects NAMESPACED resources on the source cluster its GitTarget mirrors from. It is
          the namespaced half of the two-object model: scope is carried by the rule KIND, so a WatchRule
          never selects cluster-scoped types and a ClusterWatchRule never selects namespaced ones.

          It provides fine-grained control over which resources trigger Git commits, with filtering by
          operation type, API group, version, and source namespace.

          Security model:
            - Each spec.rules[] item watches its own source namespace: the WatchRule's OWN namespace when
              omitted, an explicit name, or "*" for every namespace the GitTarget admits. Anything other
              than its own namespace passes the three-part gate described on rules[].sourceNamespace —
              provider admission, an explicit provider-side delegation flag, and the GitTarget's
              allowedSourceNamespaces. The gate is deny-by-default and re-evaluated on every reconcile,
              so a policy tightened later revokes a running rule.
            - Use ClusterWatchRule for watching cluster-scoped resources (Nodes, ClusterRoles, etc.)
            - RBAC controls who can create/modify WatchRules per namespace. Note that where the source is
              the operator's OWN cluster, an authorized override deliberately bypasses live namespace
              RBAC — which is why it takes an explicit platform-admin delegation to enable.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of WatchRule
            properties:
              rules:
                description: |-
                  Rules define which resources to watch, and in which source namespaces.
                  Multiple rules create a logical OR - a resource matching ANY rule is watched.
                  Each rule can specify operations, API groups, versions, resource types, and a source namespace.
                items:
                  description: |-
                    ResourceRule defines a set of namespaced resources to watch.
                    Omitted API groups and versions are resolved from the served Kubernetes API surface.
                    All fields except Resources are optional.
                  properties:
                    apiGroups:
                      description: |-
                        APIGroups to match. Empty string ("") matches the core API group.
                        If omitted, GitOps Reverser resolves the resource name across all served API groups.
                        Wildcards supported: "*" matches all groups.
                        Examples:
                          - [""] matches core API (pods, services, configmaps)
                          - ["apps"] matches apps API group (deployments, statefulsets)
                          - ["", "apps"] matches both core and apps groups
                          - ["*"] matches all groups
                          - [] resolves a named resource only when it is served by one API group
                      items:
                        type: string
                      type: array
                    apiVersions:
                      description: |-
                        APIVersions to match. If empty, uses the preferred served version for each group/resource.
                        Wildcards supported: "*" matches all versions.
                        Examples:
                          - ["v1"] matches only v1 version
                          - ["v1", "v1beta1"] matches both versions
                          - ["*"] matches all served versions
                          - [] matches the preferred served version

                        Multi-version note: the built-in cold-start Git path is versionless, so two
                        objects that differ only by API version resolve to the same file. To watch
                        several versions of a group/resource and keep them in separate files, give the
                        GitTarget a placement template that includes {version} (see GitTargetPlacementSpec).
                      items:
                        type: string
                      type: array
                    operations:
                      description: |-
                        Operations to watch. If empty, watches all operations (CREATE, UPDATE, DELETE).
                        Supports: CREATE, UPDATE, DELETE, or * (wildcard for all operations).
                        Examples:
                          - ["CREATE", "UPDATE"] watches only creation and updates, ignoring deletions
                          - ["*"] or [] watches all operations
                      items:
                        description: OperationType specifies the type of operation
                          that triggers a watch event.
                        enum:
                        - CREATE
                        - UPDATE
                        - DELETE
                        - '*'
                        type: string
                      type: array
                    resources:
                      description: |-
                        Resources to match (plural names like "pods", "configmaps").
                        This field is required and determines which resource types trigger this rule.
                        Wildcard semantics follow Kubernetes admission webhook patterns:
                          - "*" matches all resources
                          - "pods" matches exactly pods (case-insensitive)

                        For custom resources, use the exact plural resource name and set apiGroups
                        when more than one served API group exposes that name.

                        Note: Subresources cannot be added here. Values containing "/" (for example
                        "pods/log" or "pods/*") are rejected by the API because subresources are
                        not supported for list/watch snapshot planning. Prefix/suffix wildcards
                        like "pod*" or "*.example.com" are NOT supported. Use exact matches or the
                        "*" wildcard for broad matching.
                      items:
                        minLength: 1
                        pattern: ^[^/]*$
                        type: string
                      minItems: 1
                      type: array
                    sourceNamespace:
                      description: "SourceNamespace is the namespace this item watches
                        IN THE SOURCE CLUSTER the referenced\nGitTarget mirrors from.\n\n\t|
                        value          | meaning                                                              |\n\t|
                        omitted        | this WatchRule's own namespace — the legacy
                        behavior                 |\n\t| an exact name  | one source
                        namespace, subject to the gate below                      |\n\t|
                        \"*\"            | every namespace GitTarget.spec.allowedSourceNamespaces
                        admits, live  |\n\nNaming a namespace OTHER than this WatchRule's
                        own — including \"*\" — requires all three of:\n\n 1. the
                        GitTarget's namespace is admitted by its ClusterProvider (spec.allowedNamespaces);\n
                        2. that ClusterProvider sets spec.allowSourceNamespaceOverride;
                        and\n 3. the GitTarget's spec.allowedSourceNamespaces admits
                        the namespace.\n\n\"*\" never means \"every namespace that
                        exists\": it expands to exactly what the GitTarget's\npolicy
                        admits, so a target that declares no policy denies it. The
                        outcome for all items is\naggregated into the one SourceNamespaceAuthorized
                        condition. A DENIED explicit name refuses\nthe whole WatchRule
                        rather than silently trimming the item; a \"*\" that admits
                        nothing is\nvalid, starts no stream for this item, and is
                        reported as NoAdmittedSourceNamespaces.\n\nOnce the GitTarget
                        declares a policy that policy is exhaustive, so even an OMITTED\nsourceNamespace
                        is then checked against it — the rule's own namespace gets
                        no carve-out.\n\nThis changes only which namespace is WATCHED.
                        It never changes where objects are written:\nGit placement
                        follows each mirrored object's OWN namespace, so a rule in
                        \"tenant-acme\"\nwatching \"repo-config\" writes under repo-config/…,
                        not tenant-acme/….\n\nCost note: a \"*\" item opens one watch
                        stream per (matched type × admitted namespace) and\nproduces
                        one resync scope each, rather than a single cluster-wide stream.
                        That is deliberate —\nit keeps every replay scoped to one
                        namespace — but it is a real fan-out on a broad policy."
                      maxLength: 63
                      pattern: ^(\*|[a-z0-9]([-a-z0-9]*[a-z0-9])?)$
                      type: string
                  required:
                  - resources
                  type: object
                minItems: 1
                type: array
              sourceNamespace:
                description: |-
                  SourceNamespace is REMOVED. It moved to spec.rules[].sourceNamespace, so that the source
                  namespace sits beside the resource selector it applies to.

                  The field is retained in the schema for one release purely so that re-applying a manifest
                  that still sets it FAILS. Deleting it outright would be worse and silent: CRD pruning happens
                  on write, so an unrecognised top-level field is dropped without an error and the rule would
                  quietly watch its own namespace instead of the one it asked for. The XValidation rule on
                  spec rejects any value at admission, and the compile path refuses a stored one with the same
                  message.

                  Deprecated: use spec.rules[].sourceNamespace. Removed one release from now, or at v1beta1.
                minLength: 1
                type: string
              targetRef:
                description: |-
                  TargetRef references the GitTarget to use.
                  Must be in the same namespace.
                properties:
                  group:
                    default: configbutler.ai
                    description: API Group of the referent.
                    enum:
                    - configbutler.ai
                    type: string
                  kind:
                    default: GitTarget
                    description: |-
                      Kind of the referent.
                      Optional because this reference currently only supports a single kind (GitTarget).
                      Keeping it optional allows users to omit it while still benefiting from CRD defaulting.
                    enum:
                    - GitTarget
                    type: string
                  name:
                    description: Name of the referent.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
            required:
            - rules
            - targetRef
            type: object
            x-kubernetes-validations:
            - message: spec.sourceNamespace moved to spec.rules[].sourceNamespace
              rule: '!has(self.sourceNamespace)'
          status:
            description: status defines the observed state of WatchRule
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of an object's state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the latest generation observed
                  by the controller.
                format: int64
                type: integer
              streams:
                description: Streams is the bounded stream-readiness roll-up for the
                  types this rule resolves.
                properties:
                  blocked:
                    description: Blocked is how many resolved types cannot currently
                      be watched.
                    format: int32
                    type: integer
                  observedTime:
                    description: ObservedTime is when this roll-up was last computed.
                    format: date-time
                    type: string
                  pendingSample:
                    description: PendingSample is a bounded sample of types not yet
                      ready.
                    items:
                      type: string
                    maxItems: 5
                    type: array
                  ready:
                    description: Ready is how many resolved types are Streaming.
                    format: int32
                    type: integer
                  replaying:
                    description: Replaying is how many resolved types are still replaying
                      their initial events.
                    format: int32
                    type: integer
                  summary:
                    description: Summary is the display-only ready/total ratio.
                    type: string
                  total:
                    description: Total is how many types this rule resolves.
                    format: int32
                    type: integer
                required:
                - blocked
                - ready
                - replaying
                - total
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
