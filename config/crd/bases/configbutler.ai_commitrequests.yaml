---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: commitrequests.configbutler.ai
spec:
  group: configbutler.ai
  names:
    kind: CommitRequest
    listKind: CommitRequestList
    plural: commitrequests
    singular: commitrequest
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.targetRef.name
      name: GitTarget
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].reason
      name: Reason
      type: string
    - jsonPath: .status.sha
      name: SHA
      type: string
    - jsonPath: .status.conditions[?(@.type=="AuthorAttributed")].status
      name: AuthorAttributed
      priority: 1
      type: string
    - jsonPath: .status.conditions[?(@.type=="Pushed")].status
      name: Pushed
      priority: 1
      type: string
    - jsonPath: .status.branch
      name: Branch
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha3
    schema:
      openAPIV3Schema:
        description: |-
          CommitRequest is a one-shot "save" signal: creating one finalizes the open
          commit window for the referenced GitTarget instead of waiting for the
          silence timer. The resulting commit SHA is reported back in status.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of CommitRequest
            properties:
              closeDelaySeconds:
                description: |-
                  CloseDelaySeconds optionally delays closing the open commit window for this
                  many seconds after the CommitRequest attaches to a matching open window, acting as
                  an extra collect window: matching changes that arrive in the meantime still join
                  that window and are included in the resulting commit. Omitted or 0 closes the
                  window as soon as the CommitRequest attaches. The window can still be closed
                  earlier by another author's change or by the provider's commit window timer,
                  exactly as without a CommitRequest.
                format: int32
                maximum: 300
                minimum: 0
                type: integer
              message:
                description: |-
                  Message is an optional commit message for the finalized commit. When
                  omitted, the generated grouped-commit message is used.

                  When present it is limited to 1-1024 Unicode characters and used
                  verbatim as the commit message. Newlines are allowed so a subject and
                  body can be supplied; all other ASCII control characters (including tab
                  and carriage return) are rejected.
                maxLength: 1024
                minLength: 1
                pattern: ^[^\x00-\x09\x0B-\x1F\x7F]*$
                type: string
              targetRef:
                description: |-
                  TargetRef names the GitTarget whose open commit window to finalize.
                  The GitTarget must be in the same namespace as this CommitRequest.
                properties:
                  group:
                    default: configbutler.ai
                    description: API Group of the referent.
                    enum:
                    - configbutler.ai
                    type: string
                  kind:
                    default: GitTarget
                    description: |-
                      Kind of the referent.
                      Optional because this reference currently only supports a single kind (GitTarget).
                      Keeping it optional allows users to omit it while still benefiting from CRD defaulting.
                    enum:
                    - GitTarget
                    type: string
                  name:
                    description: Name of the referent.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
            required:
            - targetRef
            type: object
            x-kubernetes-validations:
            - message: CommitRequest spec is immutable after creation
              rule: self == oldSelf
          status:
            description: status defines the observed state of CommitRequest
            properties:
              branch:
                description: |-
                  Branch is the Git branch the GitTarget commits to. Populated once the
                  finalize resolves.
                type: string
              conditions:
                description: |-
                  Conditions report the request's progress and terminal outcome: the Ready
                  summary, the kstatus Reconciling/Stalled pair, and the domain conditions
                  AuthorAttributed and Pushed.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              sha:
                description: SHA is the resulting commit SHA. Set when the commit
                  was pushed (Pushed=True).
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
