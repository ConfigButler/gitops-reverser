name: CI

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]

env:
  GO_VERSION: "1.26.4"
  REGISTRY: ghcr.io
  IMAGE_NAME: configbutler/gitops-reverser
  IMAGE_TAG: ci-${{ github.sha }}
  CHART_REGISTRY: ghcr.io/configbutler/charts
  REPO_NAME: ${{ github.event.repository.name }}
  CI_WORKDIR: /workspaces/${{ github.event.repository.name }}

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ci-container-pr:
    name: Build CI Base Container (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      image: ${{ steps.image.outputs.name }}
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set image name
        id: image
        run: |
          IMAGE="${REGISTRY}/configbutler/gitops-reverser-ci:${{ github.sha }}"
          echo "PR: building CI base container ${IMAGE}"
          echo "name=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build CI base container
        # PR tokens must not publish packages. The image is still built and
        # loaded locally so this job validates the candidate CI container.
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .devcontainer/Dockerfile
          target: ci
          push: false
          load: true # So that we can run the next step without pulling
          tags: |
            ${{ env.REGISTRY }}/configbutler/gitops-reverser-ci:${{ github.sha }}
            ${{ env.REGISTRY }}/configbutler/gitops-reverser-ci:latest
          cache-from: type=gha,scope=ci-container

      - name: Validate CI container tools
        run: |
          docker run --rm ${{ steps.image.outputs.name }} bash -c "
            set -e
            echo '=== Validating CI Container Tools ==='
            go version
            kubectl version --client
            kustomize version
            helm version
            flux-operator version --client
            golangci-lint version
            actionlint --version
            controller-gen --version
            k3d version
            docker --version
            echo '✅ All CI container tools verified'
          "

      - name: Save CI container image
        run: docker save "${{ steps.image.outputs.name }}" -o ci-container-image.tar

      - name: Upload CI container image artifact
        uses: actions/upload-artifact@v7
        with:
          name: ci-container-image
          path: ci-container-image.tar
          if-no-files-found: error
          retention-days: 1

  build-ci-container-trusted:
    name: Build CI Base Container (trusted)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    outputs:
      image: ${{ steps.image.outputs.name }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        id: image
        run: |
          IMAGE="${REGISTRY}/configbutler/gitops-reverser-ci:${{ github.sha }}"
          echo "Building CI base container: ${IMAGE}"
          echo "name=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build and push CI base container
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .devcontainer/Dockerfile
          target: ci
          push: true
          load: true # So that we can run the next step without pulling
          tags: |
            ${{ steps.image.outputs.name }}
            ${{ env.REGISTRY }}/configbutler/gitops-reverser-ci:latest
          cache-from: type=gha,scope=ci-container
          cache-to: type=gha,mode=max,scope=ci-container

      - name: Validate CI container tools
        run: |
          docker run --rm ${{ steps.image.outputs.name }} bash -c "
            set -e
            echo '=== Validating CI Container Tools ==='
            go version
            kubectl version --client
            kustomize version
            helm version
            flux-operator version --client
            golangci-lint version
            actionlint --version
            controller-gen --version
            k3d version
            docker --version
            echo '✅ All CI container tools verified'
          "

  ci-container:
    name: Select CI Base Container
    runs-on: ubuntu-latest
    if: always()
    needs: [build-ci-container-pr, build-ci-container-trusted]
    outputs:
      image: ${{ steps.image.outputs.name }}
    permissions:
      contents: read
      packages: read
    steps:
      - name: Select image
        id: image
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ needs.build-ci-container-pr.result }}" != "success" ]; then
              echo "PR CI container build did not succeed: ${{ needs.build-ci-container-pr.result }}" >&2
              exit 1
            fi
            IMAGE="${{ needs.build-ci-container-pr.outputs.image }}"
          else
            if [ "${{ needs.build-ci-container-trusted.result }}" != "success" ]; then
              echo "Trusted CI container build did not succeed: ${{ needs.build-ci-container-trusted.result }}" >&2
              exit 1
            fi
            IMAGE="${{ needs.build-ci-container-trusted.outputs.image }}"
          fi
          if [ -z "${IMAGE}" ]; then
            echo "No CI container image was selected" >&2
            exit 1
          fi
          echo "name=${IMAGE}" >> "$GITHUB_OUTPUT"

  validate-devcontainer:
    name: Validate Dev Container
    runs-on: ubuntu-latest
    needs: ci-container
    if: ${{ !cancelled() && needs.ci-container.result == 'success' }}
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build dev container (validation only)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .devcontainer/Dockerfile
          target: dev
          push: false
          load: true
          tags: gitops-reverser-devcontainer:test
          cache-from: type=gha,scope=devcontainer
          cache-to: ${{ github.event_name == 'pull_request' && '' || 'type=gha,scope=devcontainer,mode=max' }}
          build-args: |
            BUILDKIT_CONTEXT_KEEP_GIT_DIR=1

      - name: Validate dev container tools
        run: |
          docker run --rm gitops-reverser-devcontainer:test bash -lc "
            set -e
            export PATH=/usr/local/go/bin:/go/bin:\$PATH
            echo '=== Validating Dev Container Tools ==='
            go version
            kubectl version --client
            kustomize version
            helm version
            flux-operator version --client
            golangci-lint version
            actionlint --version
            k3d version
            task --version
            bash -ic 'complete -p task >/dev/null'
            docker --version
            echo '✅ All dev container tools verified'
          "

  lint-helm:
    name: Build Helm chart and installer bundle
    runs-on: ubuntu-latest
    needs: ci-container
    if: ${{ !cancelled() && needs.ci-container.result == 'success' }}
    permissions:
      contents: read
      packages: read
    env:
      CI_CONTAINER: ${{ needs.ci-container.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Login to Docker registry
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Download CI container image (PR)
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@v8
        with:
          name: ci-container-image
          path: .

      - name: Load CI container image (PR)
        if: github.event_name == 'pull_request'
        run: docker load -i ci-container-image.tar

      - name: Lint and package Helm chart
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:${{ env.CI_WORKDIR }}" \
            -w "${{ env.CI_WORKDIR }}" \
            "${CI_CONTAINER}" \
            bash -lc '
              set -e
              git config --global --add safe.directory "$PWD"
              task helm-sync
              helm lint charts/gitops-reverser
              helm template gitops-reverser charts/gitops-reverser \
                --namespace gitops-reverser-system \
                --set image.repository=test/image \
                --set image.tag=test
              task dist-install
              helm package charts/gitops-reverser --destination .
              mv gitops-reverser-*.tgz gitops-reverser.tgz
            '

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-bundle
          path: |
            dist/install.yaml
            gitops-reverser.tgz
          if-no-files-found: error

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: ci-container
    if: ${{ !cancelled() && needs.ci-container.result == 'success' }}
    permissions:
      contents: read
      packages: read
    env:
      CI_CONTAINER: ${{ needs.ci-container.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Login to Docker registry
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Download CI container image (PR)
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@v8
        with:
          name: ci-container-image
          path: .

      - name: Load CI container image (PR)
        if: github.event_name == 'pull_request'
        run: docker load -i ci-container-image.tar

      - name: Run lint tasks
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:${{ env.CI_WORKDIR }}" \
            -w "${{ env.CI_WORKDIR }}" \
            "${CI_CONTAINER}" \
            bash -lc '
              set -e
              git config --global --add safe.directory "$PWD"
              task lint
              cache_log="$(mktemp)"
              task --dry --verbose lint 2>&1 | tee "${cache_log}"

              for task_name in \
                generate \
                manifests \
                helm-sync \
                lint-golang \
                lint-dockerfiles \
                lint-actions \
                lint-helm
              do
                if ! grep -Fq "Task \"${task_name}\" is up to date" "${cache_log}"; then
                  echo "Expected ${task_name} to be cached after task lint" >&2
                  exit 1
                fi
              done

              if grep -Eq "^task: \[[^]]+\]" "${cache_log}"; then
                echo "Expected second task lint dry-run to be fully cached, but a command would run" >&2
                exit 1
              fi
            '

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: ci-container
    if: ${{ !cancelled() && needs.ci-container.result == 'success' }}
    permissions:
      contents: read
      packages: read
      id-token: write
    env:
      CI_CONTAINER: ${{ needs.ci-container.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Login to Docker registry
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Download CI container image (PR)
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@v8
        with:
          name: ci-container-image
          path: .

      - name: Load CI container image (PR)
        if: github.event_name == 'pull_request'
        run: docker load -i ci-container-image.tar

      - name: Run tests
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:${{ env.CI_WORKDIR }}" \
            -w "${{ env.CI_WORKDIR }}" \
            "${CI_CONTAINER}" \
            bash -lc '
              set -e
              git config --global --add safe.directory "$PWD"
              task test
            '

      - name: Make test artifacts readable by the runner
        if: always()
        run: sudo chmod -R a+rX cover.out .coverage-baseline config/crd/bases config/rbac config/webhook 2>/dev/null || true

      - name: Upload unit coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: cover.out
          flags: unit
          use_oidc: true
          fail_ci_if_error: false

  docker-build-pr:
    name: Build (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      image: ${{ steps.image.outputs.name }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set full image name and build metadata
        id: image
        run: |
          FULL_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          echo "name=${FULL_IMAGE}" >> $GITHUB_OUTPUT
          echo "git_commit=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "Building image: ${FULL_IMAGE}"

      - name: Build Docker image
        # PRs cannot publish to the org registry. Build and load locally, then
        # hand the image to e2e as an artifact.
        uses: ./.github/actions/docker-build
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          login: false
          platforms: linux/amd64
          tags: ${{ steps.image.outputs.name }}
          push: false
          load: true
          cache-scope: build-linux/amd64
          build-args: |
            VERSION=${{ env.IMAGE_TAG }}
            GIT_COMMIT=${{ steps.image.outputs.git_commit }}
            GIT_DIRTY=0
            BUILD_DATE=${{ steps.image.outputs.build_date }}
            GOCOVER=1

      - name: Save project image
        # PR builds aren't pushed, so persist the locally-loaded image as an
        # artifact; e2e loads it and imports it into k3d.
        run: docker save "${{ steps.image.outputs.name }}" -o project-image.tar

      - name: Upload project image artifact
        uses: actions/upload-artifact@v7
        with:
          name: project-image
          path: project-image.tar
          if-no-files-found: error
          retention-days: 1

  docker-build-trusted:
    name: Build (trusted)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    outputs:
      image: ${{ steps.image.outputs.name }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set full image name and build metadata
        id: image
        run: |
          FULL_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          echo "name=${FULL_IMAGE}" >> $GITHUB_OUTPUT
          echo "git_commit=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "Building image: ${FULL_IMAGE}"

      - name: Build and push Docker image
        uses: ./.github/actions/docker-build
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          platforms: linux/amd64
          tags: ${{ steps.image.outputs.name }}
          outputs: type=image,push=true
          cache-scope: build-linux/amd64
          cache-to: type=gha,mode=max,scope=build-linux/amd64
          build-args: |
            VERSION=${{ env.IMAGE_TAG }}
            GIT_COMMIT=${{ steps.image.outputs.git_commit }}
            GIT_DIRTY=0
            BUILD_DATE=${{ steps.image.outputs.build_date }}
            GOCOVER=1

  project-image:
    name: Select Project Image
    runs-on: ubuntu-latest
    if: always()
    needs: [docker-build-pr, docker-build-trusted]
    outputs:
      image: ${{ steps.image.outputs.name }}
    permissions:
      contents: read
    steps:
      - name: Select image
        id: image
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ needs.docker-build-pr.result }}" != "success" ]; then
              echo "PR project image build did not succeed: ${{ needs.docker-build-pr.result }}" >&2
              exit 1
            fi
            IMAGE="${{ needs.docker-build-pr.outputs.image }}"
          else
            if [ "${{ needs.docker-build-trusted.result }}" != "success" ]; then
              echo "Trusted project image build did not succeed: ${{ needs.docker-build-trusted.result }}" >&2
              exit 1
            fi
            IMAGE="${{ needs.docker-build-trusted.outputs.image }}"
          fi
          if [ -z "${IMAGE}" ]; then
            echo "No project image was selected" >&2
            exit 1
          fi
          echo "name=${IMAGE}" >> "$GITHUB_OUTPUT"

  e2e:
    name: E2E (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [ci-container, project-image, lint-helm]
    if: >-
      ${{
        !cancelled()
        && needs.ci-container.result == 'success'
        && needs.project-image.result == 'success'
        && needs.lint-helm.result == 'success'
      }}
    permissions:
      contents: read
      packages: read
      id-token: write
    strategy:
      matrix:
        include:
          - name: quickstart
            script: >-
              export INSTALL_MODE=helm HELM_CHART_SOURCE=./gitops-reverser.tgz
              && task test-e2e-quickstart-helm
              && task test-image-refresh
              && export INSTALL_MODE=plain-manifests-file
              && task test-e2e-quickstart-manifest
            needs_artifact: true
            e2e_ginkgo_procs: "2"
            k3d_agent_count: "0"
            # Helm/manifest installs don't carry the GOCOVERDIR overlay, so no
            # coverage is collected here.
            coverage: ""
          - name: full
            script: "task test-e2e"
            needs_artifact: false
            # config-dir install carries the GOCOVERDIR overlay; collect e2e coverage.
            coverage: "1"
            # Bumped 1 -> 4: the full suite was serialized to avoid the
            # cross-target rule-change snapshot coupling, now fixed (per-target
            # effective watch plan — docs/design/gittarget-isolation-on-rule-change.md).
            # Validated locally at --procs=4; trialing the same in CI.
            e2e_ginkgo_procs: "4"
            k3d_agent_count: "0"
    env:
      PROJECT_IMAGE: ${{ needs.project-image.outputs.image }}
      CI_CONTAINER: ${{ needs.ci-container.outputs.image }}
      # PRs never push the project image, so it can't be pulled from the
      # registry. Deliver it via `load` instead: the artifact is docker-loaded
      # below and imported into k3d. Trusted pushes keep pulling from GHCR.
      IMAGE_DELIVERY_MODE: ${{ github.event_name == 'pull_request' && 'load' || 'pull' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download release bundle artifact
        if: matrix.needs_artifact
        uses: actions/download-artifact@v8
        with:
          name: release-bundle
          path: .

      - name: Download CI container image (PR)
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@v8
        with:
          name: ci-container-image
          path: .

      - name: Load CI container image (PR)
        if: github.event_name == 'pull_request'
        run: docker load -i ci-container-image.tar

      - name: Login to Docker registry
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Download project image (PR)
        # PR builds weren't pushed; pull the tarball built by docker-build-pr.
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@v8
        with:
          name: project-image
          path: .

      - name: Load project image into Docker (PR)
        # Make PROJECT_IMAGE available in the runner's Docker daemon so the k3d
        # image import (load delivery) finds it locally instead of pulling.
        if: github.event_name == 'pull_request'
        run: docker load -i project-image.tar

      - name: Start disk usage sampler
        run: |
          # Sample free space on / every 10s for the whole e2e run so we can see
          # the peak (not just the post-run value). /var/lib/docker — k3d node
          # volumes, pulled images, build cache — lives on this filesystem.
          ( while true; do
              printf '%s avail=%s\n' "$(date -u +%H:%M:%S)" \
                "$(df --output=avail -BM / | tail -1 | tr -d ' ')"
              sleep 10
            done ) > "df-samples-${{ matrix.name }}.log" 2>/dev/null &
          echo "SAMPLER_PID=$!" >> "$GITHUB_ENV"

      - name: Bring up cluster + Flux services (explicit, streaming logs)
        run: |
          # Install-mode-/image-independent slice of prepare-e2e. Runs the
          # slow, hang-prone cluster + Flux + services bring-up here so its
          # logs stream live, instead of being buffered inside Ginkgo's
          # SynchronizedBeforeSuite (where a stall just looks like a silent
          # 15m hang ending in a goroutine dump). The in-suite prepare-e2e
          # no-ops this part because the stamps already exist.
          docker run --rm \
            --network host \
            -v "${GITHUB_WORKSPACE}:${{ env.CI_WORKDIR }}" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -w "${{ env.CI_WORKDIR }}" \
            -e IMAGE_DELIVERY_MODE=${{ env.IMAGE_DELIVERY_MODE }} \
            -e K3D_AGENT_COUNT=${{ matrix.k3d_agent_count }} \
            -e HOST_PROJECT_PATH=${{ github.workspace }} \
            -e KUBECONFIG=${{ env.CI_WORKDIR }}/.stamps/cluster/k3d-gitops-reverser-test-e2e/.kube/config \
            ${{ env.CI_CONTAINER }} \
            bash -c "
              git config --global --add safe.directory ${{ env.CI_WORKDIR }}
              # The cluster is created here but reused by the test container
              # below. start-cluster.sh writes the k3d context into KUBECONFIG;
              # point it at a file on the mounted workspace so the next
              # container inherits the context (otherwise it is lost with this
              # ephemeral container and kubectl reports 'context does not exist').
              # Living under .stamps/cluster/<ctx>/.kube keeps it tied to the
              # cluster lifecycle: cleanup-installs.sh (per-namespace) leaves it
              # alone, while clean-cluster (rm -rf .stamps/cluster/<ctx>) clears
              # it together with the cluster it points at.
              mkdir -p .stamps/cluster/k3d-gitops-reverser-test-e2e/.kube
              task _services-ready
            "

      - name: Run E2E tests in CI container
        run: |
          docker run --rm \
            --network host \
            -v "${GITHUB_WORKSPACE}:${{ env.CI_WORKDIR }}" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -w "${{ env.CI_WORKDIR }}" \
            -e PROJECT_IMAGE=${{ env.PROJECT_IMAGE }} \
            -e IMAGE_DELIVERY_MODE=${{ env.IMAGE_DELIVERY_MODE }} \
            -e E2E_GINKGO_PROCS=${{ matrix.e2e_ginkgo_procs }} \
            -e K3D_AGENT_COUNT=${{ matrix.k3d_agent_count }} \
            -e HOST_PROJECT_PATH=${{ github.workspace }} \
            -e KUBECONFIG=${{ env.CI_WORKDIR }}/.stamps/cluster/k3d-gitops-reverser-test-e2e/.kube/config \
            ${{ env.CI_CONTAINER }} \
            bash -c "
              git config --global --add safe.directory ${{ env.CI_WORKDIR }}
              ${{ matrix.script }}
            "

      - name: Collect E2E coverage
        if: matrix.coverage == '1'
        # Fail-safe: a coverage hiccup must never fail the e2e gate.
        run: |
          docker run --rm \
            --network host \
            -v "${GITHUB_WORKSPACE}:${{ env.CI_WORKDIR }}" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -w "${{ env.CI_WORKDIR }}" \
            -e KUBECONFIG=${{ env.CI_WORKDIR }}/.stamps/cluster/k3d-gitops-reverser-test-e2e/.kube/config \
            ${{ env.CI_CONTAINER }} \
            bash -c "
              git config --global --add safe.directory ${{ env.CI_WORKDIR }}
              task e2e-coverage-collect
            " || echo "e2e coverage collection failed (non-fatal)"

      - name: Upload E2E coverage to Codecov
        if: matrix.coverage == '1'
        uses: codecov/codecov-action@v7
        with:
          files: e2e-cover.out
          flags: e2e
          use_oidc: true
          fail_ci_if_error: false

      - name: Report disk usage (peak + final)
        if: always()
        run: |
          kill "${SAMPLER_PID}" 2>/dev/null || true
          samples="df-samples-${{ matrix.name }}.log"
          {
            echo "### Disk usage (${{ matrix.name }})"
            echo
            echo "Lowest free space on \`/\` during the run:"
            echo '```'
            sort -t= -k2 -n "${samples}" 2>/dev/null | head -1 || echo "(no samples captured)"
            echo '```'
            echo "Final state:"
            echo '```'
            df -h /
            echo
            docker system df
            echo '```'
            echo "<details><summary>Full df sample timeline</summary>"
            echo
            echo '```'
            cat "${samples}" 2>/dev/null || echo "(no samples captured)"
            echo '```'
            echo "</details>"
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Make E2E artifacts readable by the runner
        if: always()
        # The E2E suite runs in a root container that mounts the workspace, so
        # everything it writes under .stamps/ (e.g. e2e-repo-artifacts/) is
        # root-owned with restrictive perms. The upload step below runs on the
        # host as the non-root runner user and fails with EACCES when its glob
        # tries to scandir those dirs. Relax perms so the runner can traverse
        # and read them. a+rX adds read for files and traverse for dirs only.
        run: sudo chmod -R a+rX .stamps || true

      - name: Upload E2E raw Ginkgo JSON reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-ginkgo-reports-${{ matrix.name }}
          path: .stamps/**/ginkgo-report-*.json
          # Reports live under the dot-dir .stamps/, which upload-artifact treats
          # as hidden and excludes by default — without this the upload silently
          # finds no files. See the "No files were found" gotcha in upload-artifact v4+.
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 60

  # Release job only runs on push to main after tests pass
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint-helm, lint, test, e2e, validate-devcontainer]
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Build and push Docker images in parallel for each platform
  publish:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runs_on }}
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runs_on: ubuntu-latest
          - platform: linux/arm64
            runs_on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.release-please.outputs.version }}
            type=raw,value=latest

      - name: Compute build metadata
        id: buildmeta
        run: |
          echo "git_commit=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image by digest
        id: build
        uses: ./.github/actions/docker-build
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true
          cache-scope: build-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.platform }}
          build-args: |
            VERSION=${{ needs.release-please.outputs.version }}
            GIT_COMMIT=${{ steps.buildmeta.outputs.git_commit }}
            GIT_DIRTY=0
            BUILD_DATE=${{ steps.buildmeta.outputs.build_date }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Merge all platform images into multi-arch manifests
  publish-manifest:
    name: Publish Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: [release-please, publish]
    permissions:
      contents: write
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.release-please.outputs.version }}
            type=raw,value=latest

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

      - name: Update release info
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          append_body: true
          body: |
            ## Installation
            ### Quick Install (Single YAML)
            ```bash
            kubectl apply -f https://github.com/ConfigButler/gitops-reverser/releases/download/${{ needs.release-please.outputs.tag_name }}/install.yaml
            ```
            ### Helm Chart
            ```bash
            helm install gitops-reverser oci://${{ env.CHART_REGISTRY }}/gitops-reverser --version ${{ needs.release-please.outputs.version }}
            ```
            ## Docker Images
            This release is available as a Docker image:
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.release-please.outputs.version }}
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ```
            **Platforms:** linux/amd64, linux/arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish Helm chart to ghcr.io as OCI artifact
  publish-helm:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    needs: [ci-container, e2e, release-please]
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write
      packages: write
    container:
      image: ${{ needs.ci-container.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Configure Git safe directory
        run: git config --global --add safe.directory /__w/gitops-reverser/gitops-reverser

      - name: Download tested release bundle artifact
        uses: actions/download-artifact@v8
        with:
          name: release-bundle
          path: .

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Push Helm chart to GHCR
        run: |
          helm push ./gitops-reverser.tgz oci://${{ env.CHART_REGISTRY }}

      - name: Upload install.yaml as release asset
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/install.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
