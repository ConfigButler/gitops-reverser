# OpenSSF Scorecard: automated supply-chain hygiene checks (token permissions,
# pinned dependencies, branch protection, dangerous workflow patterns, ...).
# Results land in the repo's code-scanning tab and on the public Scorecard
# report at https://scorecard.dev/viewer/?uri=github.com/ConfigButler/gitops-reverser
name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "30 3 * * 1"
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write # upload SARIF to code scanning
      id-token: write # publish results to the public Scorecard API

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: results.sarif
