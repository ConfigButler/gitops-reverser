name: 'Setup Docker and Build Image'
description: 'Sets up Docker Buildx, logs in to registry, and builds/pushes image'
inputs:
  registry:
    description: 'Container registry to login to'
    required: true
  username:
    description: 'Registry username'
    required: true
  password:
    description: 'Registry password'
    required: true
  login:
    description: 'Log in to the registry before building. Set to false for PR validation builds that do not push.'
    required: false
    default: 'true'
  platforms:
    description: 'Target platforms (e.g., linux/amd64)'
    required: true
  tags:
    description: 'Image tags'
    required: false
  labels:
    description: 'Image labels'
    required: false
  build-args:
    description: 'Build args passed to the image build (newline-separated KEY=VALUE)'
    required: false
  outputs:
    description: 'Build outputs (e.g., type=image,push=true or type=image,name=...,push-by-digest=true). Overrides push/load when set.'
    required: false
    default: ''
  push:
    description: 'Push the built image to the registry. Set to false for fork PRs whose read-only token cannot write packages.'
    required: false
    default: 'true'
  load:
    description: 'Load the built image into the local Docker daemon (single-platform only). Used to hand a fork-built image to later jobs via an artifact instead of a registry push.'
    required: false
    default: 'false'
  cache-scope:
    description: 'Cache scope name'
    required: true
  cache-to:
    description: 'Build cache export destination. Leave empty for PR builds that should only restore cache.'
    required: false
    default: ''
outputs:
  digest:
    description: 'Image digest'
    value: ${{ steps.build.outputs.digest }}
runs:
  using: 'composite'
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Log in to Container Registry
      if: ${{ inputs.login == 'true' }}
      uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: .
        platforms: ${{ inputs.platforms }}
        push: ${{ inputs.push }}
        load: ${{ inputs.load }}
        tags: ${{ inputs.tags }}
        labels: ${{ inputs.labels }}
        build-args: ${{ inputs.build-args }}
        cache-from: type=gha,scope=${{ inputs.cache-scope }}
        cache-to: ${{ inputs.cache-to }}
        outputs: ${{ inputs.outputs }}
