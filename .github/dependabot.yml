version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      go-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    # Covers the project Dockerfile and the devcontainer/CI base image, so
    # digest-pinned FROM lines keep moving with upstream.
    directories:
      - "/"
      - "/.devcontainer"
    schedule:
      interval: "weekly"
    groups:
      docker-dependencies:
        patterns:
          - "*"