[maxbodylength]
maxBodyLength = 20

# phonydeclared produces false positives for stamp-file targets whose names
# contain Make variables (e.g. $(CS)/$(NAMESPACE)/sops-secret.applied).
# Checkmake cannot expand variables, so it cannot determine that these targets
# do create real files on disk.  Making them .PHONY would break the stamp system.
[phonydeclared]
enabled = false
