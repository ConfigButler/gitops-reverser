{{- if and .Values.servers.admission.enabled .Values.servers.admission.tls.certManager .Values.certManager.enabled }}
---
# Serving certificate for the validating admission (internal-commands) webhook. It is
# fronted by the controller Service, so its dnsNames are that Service's in-cluster names
# (the same the apiserver dials). The webhook config's cert-manager.io/inject-ca-from
# annotation injects this issuer's CA bundle into the webhook clientConfig automatically.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "gitops-reverser.admissionServerCertName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gitops-reverser.labels" . | nindent 4 }}
spec:
  dnsNames:
    - {{ include "gitops-reverser.fullname" . }}.{{ .Release.Namespace }}.svc
    - {{ include "gitops-reverser.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    kind: {{ .Values.certManager.issuer.kind }}
    name: {{ .Values.certManager.issuer.name }}
  secretName: {{ include "gitops-reverser.admissionServerSecretName" . }}
  usages:
    - digital signature
    - key encipherment
    - server auth
  privateKey:
    rotationPolicy: Always
{{- end }}
