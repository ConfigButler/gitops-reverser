{{- if .Values.servers.admission.enabled }}
---
# Fail-closed guard on GitTarget.spec.kubeConfig.secretRef: when a GitTarget names a kubeconfig
# Secret, the operator issues a SubjectAccessReview for the requesting user's `get` on that
# Secret and denies admission if they lack it. This closes the confused-deputy escalation the
# config-plane split opens — a tenant granted create on GitTarget but not Secret-read could
# otherwise name a privileged kubeconfig Secret they cannot read, and the operator (which can)
# would mirror that remote cluster's state into a repo the tenant controls.
# See docs/design/config-plane-split.md "Credential-reference authorization".
#
# failurePolicy is Fail (not Ignore): a missed check would silently admit the escalation. It is
# safe to fail closed because this matches ONLY configbutler.ai/gittargets — never core
# resources — so a webhook-down state blocks GitTarget writes but can never deadlock bootstrap.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "gitops-reverser.fullname" . }}-validate-gittarget-kubeconfig
  labels:
    {{- include "gitops-reverser.labels" . | nindent 4 }}
  {{- if and .Values.servers.admission.tls.certManager .Values.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "gitops-reverser.admissionServerCertName" . }}
  {{- end }}
webhooks:
  - name: validate-gittarget-kubeconfig.configbutler.ai
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "gitops-reverser.fullname" . }}
        namespace: {{ .Release.Namespace }}
        path: /validate-gittarget-kubeconfig
        port: {{ .Values.servers.admission.port }}
    failurePolicy: Fail
    matchPolicy: Equivalent
    rules:
      - apiGroups:
          - configbutler.ai
        apiVersions:
          - v1alpha3
        operations:
          - CREATE
          - UPDATE
        resources:
          - gittargets
        scope: Namespaced
    # The SubjectAccessReview it issues reads the authorization API; it changes no cluster
    # state, so there are no side effects on any request.
    sideEffects: None
    timeoutSeconds: {{ .Values.servers.admission.timeoutSeconds }}
{{- end }}
