{{- if .Values.certificates.certManager.enabled }}
{{- if .Values.certificates.certManager.issuer.create }}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Values.certificates.certManager.issuer.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gitops-reverser.labels" . | nindent 4 }}
spec:
  selfSigned: {}
{{- end }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "gitops-reverser.fullname" . }}-admission-server-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gitops-reverser.labels" . | nindent 4 }}
spec:
  dnsNames:
    - {{ include "gitops-reverser.fullname" . }}.{{ .Release.Namespace }}.svc
    - {{ include "gitops-reverser.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    kind: {{ .Values.certificates.certManager.issuer.kind }}
    name: {{ .Values.certificates.certManager.issuer.name }}
  secretName: {{ .Values.servers.admission.tls.secretName | default (printf "%s-admission-server-cert" (include "gitops-reverser.fullname" .)) }}
  usages:
    - digital signature
    - key encipherment
    - server auth
  privateKey:
    rotationPolicy: Always
{{- if .Values.servers.audit.tls.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "gitops-reverser.fullname" . }}-audit-root-ca
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gitops-reverser.labels" . | nindent 4 }}
spec:
  commonName: {{ include "gitops-reverser.fullname" . }}-audit-root-ca
  duration: 87600h
  isCA: true
  issuerRef:
    kind: {{ .Values.certificates.certManager.issuer.kind }}
    name: {{ .Values.certificates.certManager.issuer.name }}
  privateKey:
    algorithm: ECDSA
    rotationPolicy: Always
    size: 256
  secretName: {{ .Values.certificates.audit.rootCA.secretName | default (printf "%s-audit-root-ca" (include "gitops-reverser.fullname" .)) }}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "gitops-reverser.fullname" . }}-audit-ca-issuer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gitops-reverser.labels" . | nindent 4 }}
spec:
  ca:
    secretName: {{ .Values.certificates.audit.rootCA.secretName | default (printf "%s-audit-root-ca" (include "gitops-reverser.fullname" .)) }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "gitops-reverser.fullname" . }}-audit-server-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gitops-reverser.labels" . | nindent 4 }}
spec:
  dnsNames:
    - {{ include "gitops-reverser.auditServiceName" . }}.{{ .Release.Namespace }}.svc
    - {{ include "gitops-reverser.auditServiceName" . }}.{{ .Release.Namespace }}.svc.cluster.local
  duration: 2160h
  issuerRef:
    kind: Issuer
    name: {{ include "gitops-reverser.fullname" . }}-audit-ca-issuer
  renewBefore: 360h
  secretName: {{ .Values.servers.audit.tls.secretName | default (printf "%s-audit-server-cert" (include "gitops-reverser.fullname" .)) }}
  usages:
    - digital signature
    - key encipherment
    - server auth
  privateKey:
    rotationPolicy: Always
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "gitops-reverser.fullname" . }}-audit-client-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gitops-reverser.labels" . | nindent 4 }}
spec:
  commonName: kube-apiserver
  duration: {{ .Values.certificates.audit.client.duration | quote }}
  issuerRef:
    kind: Issuer
    name: {{ include "gitops-reverser.fullname" . }}-audit-ca-issuer
  renewBefore: {{ .Values.certificates.audit.client.renewBefore | quote }}
  secretName: {{ .Values.certificates.audit.client.secretName | default (printf "%s-audit-client-cert" (include "gitops-reverser.fullname" .)) }}
  usages:
    - digital signature
    - client auth
  privateKey:
    rotationPolicy: Always
{{- end }}
{{- if .Values.servers.metrics.tls.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "gitops-reverser.fullname" . }}-metrics-server-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gitops-reverser.labels" . | nindent 4 }}
spec:
  dnsNames:
    - {{ include "gitops-reverser.fullname" . }}.{{ .Release.Namespace }}.svc
    - {{ include "gitops-reverser.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    kind: {{ .Values.certificates.certManager.issuer.kind }}
    name: {{ .Values.certificates.certManager.issuer.name }}
  secretName: {{ .Values.servers.metrics.tls.secretName | default (printf "%s-metrics-server-cert" (include "gitops-reverser.fullname" .)) }}
  usages:
    - digital signature
    - key encipherment
    - server auth
  privateKey:
    rotationPolicy: Always
{{- end }}
{{- end }}
