{{- if .Values.certManager.enabled }}
{{- if .Values.certManager.issuer.create }}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Values.certManager.issuer.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gitops-reverser.labels" . | nindent 4 }}
spec:
  selfSigned: {}
{{- end }}
{{- if and .Values.servers.metrics.tls.enabled .Values.servers.metrics.tls.certManager }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "gitops-reverser.fullname" . }}-metrics-server-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gitops-reverser.labels" . | nindent 4 }}
spec:
  dnsNames:
    - {{ include "gitops-reverser.fullname" . }}.{{ .Release.Namespace }}.svc
    - {{ include "gitops-reverser.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    kind: {{ .Values.certManager.issuer.kind }}
    name: {{ .Values.certManager.issuer.name }}
  secretName: {{ .Values.servers.metrics.tls.secretNameOverride | default (printf "%s-metrics-server-cert" (include "gitops-reverser.fullname" .)) }}
  usages:
    - digital signature
    - key encipherment
    - server auth
  privateKey:
    rotationPolicy: Always
{{- end }}
{{- end }}
