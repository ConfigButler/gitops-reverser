# Default values for gitops-reverser.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# High Availability configuration - runs 1 replicas by default (HA support is not good enough yet)
replicaCount: 1
deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 0
    maxUnavailable: 1

image:
  repository: ghcr.io/configbutler/gitops-reverser
  pullPolicy: IfNotPresent
  tag: 0.34.0 # x-release-please-version

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
# Create the release namespace as part of chart rendering (useful for install.yaml workflows).
# Keep false for standard Helm installs where --create-namespace is preferred.
createNamespace: false

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

# Extension points the Deployment appends as-is. Declared here because the template already
# reads them; without an entry they are invisible to anyone reading values.yaml.
env: [] # Kubernetes EnvVar entries, e.g. [{name: REDIS_PASSWORD, valueFrom: {...}}]
volumes: []
volumeMounts: []

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532

# Controller manager behaviour (the servers it runs are configured under `servers`).
controllerManager:
  # Extra Secret-shaped resources that must use the encrypted Git write path.
  # Entries are resource or group/resource, for example core.cozystack.io/tenantsecrets.
  additionalSensitiveResources: []

# cert-manager issuer shared by every certificate the chart mints. One self-signed CA
# backs them all, so the issuer is genuinely cross-cutting and lives here; each server
# opts into a cert via servers.<name>.tls.certManager. (Deliberately NOT duplicated per
# server — that one shared resource is the exception to the "servers as peers" rule.)
certManager:
  enabled: true
  issuer:
    name: selfsigned-issuer
    kind: Issuer
    create: true

# Every HTTP(S) server the manager runs, as peers. Each has a bindAddress; those fronted
# by a Service also have a port, and those serving TLS carry a tls block of the same
# shape (enabled, certManager, cert paths, secretNameOverride). cert-manager mints a
# serving cert for a server when certManager.enabled (above) and that server's
# tls.certManager are both true.
servers:
  # Disable HTTP/2 on the TLS servers (mitigates the HTTP/2 Rapid-Reset CVE class).
  enableHTTP2: false

  # Liveness/readiness probe endpoint. Plain HTTP, no TLS, no Service.
  healthProbe:
    bindAddress: ":8081"
    port: 8081

  metrics:
    bindAddress: ":8080"
    port: 8080
    tls:
      # Serve metrics over HTTPS when true, HTTP when false.
      enabled: false
      # Mint the serving cert via cert-manager (only used when tls.enabled).
      certManager: true
      certPath: "/tmp/k8s-metrics-server/metrics-server-certs"
      certName: "tls.crt"
      certKey: "tls.key"
      # Leave empty to use the chart-generated Secret name.
      secretNameOverride: ""

  # Validating admission server hosting the validate-operator-types webhook, which captures
  # the submitter of each CommitRequest at admission and names them as the commit author
  # (read back by the controller with no wait). Independent of `attribution` below:
  # attribution governs *mirrored-resource* authorship (from audit), this governs
  # *command* authorship (from admission). Off → CommitRequests commit as the configured
  # committer and report AuthorAttributed=False. See
  # docs/spec/commitrequest-admission-authorship.md.
  #
  # Command-author capture is Redis-backed: the captured author is written to Redis at admission and
  # read back at reconcile. Enabled by default so the webhook is always installed, but it is a no-op
  # without Redis: the pod runs healthy and CommitRequests commit as the configured committer
  # (AuthorAttributed=False) until queue.redis.addr is set.
  admission:
    enabled: true
    bindAddress: ":9443"
    port: 9443
    # Bounded per-request wait before the apiserver gives up on the webhook.
    # failurePolicy is Ignore, so a slow/unreachable backend admits the command anyway.
    timeoutSeconds: 2
    tls:
      # The admission server always serves TLS (the apiserver requires HTTPS); the only
      # choice is who mints the cert. certManager=false means BYO via secretNameOverride
      # (and patch the webhook caBundle out of band).
      certManager: true
      certPath: "/tmp/k8s-webhook-server/serving-certs"
      certName: "tls.crt"
      certKey: "tls.key"
      # Leave empty to use the chart-generated Secret name.
      secretNameOverride: ""

  audit:
    # host:port the audit ingress server binds to (passed as --audit-bind-address).
    bindAddress: "0.0.0.0:9444"
    # Container/Service port; must match the port in bindAddress above.
    port: 9444
    timeouts:
      read: "15s"
      write: "30s"
      idle: "60s"
    maxRequestBodyBytes: 10485760
    tls:
      # Serve audit ingress over HTTPS when true, HTTP when false.
      enabled: true
      # Mint the audit serving cert (and the kube-apiserver client cert below) via
      # cert-manager. Set false to provide those Secrets yourself.
      certManager: true
      certPath: "/tmp/k8s-audit-server/audit-server-certs"
      certName: "tls.crt"
      certKey: "tls.key"
      clientCAPath: "/tmp/k8s-audit-server/audit-client-ca"
      clientCAName: "tls.crt"
      # Leave empty to use the chart-generated Secret name.
      secretNameOverride: ""
      # Audit alone also needs a CA that signs the kube-apiserver client cert (mTLS), so
      # the root CA and that client cert are configured here, under audit.
      rootCA:
        # Leave empty to use the chart-generated Secret name.
        secretNameOverride: ""
      client:
        # Keep the kube-apiserver client cert long-lived by default so cluster admins are
        # protected from frequent manual audit-webhook kubeconfig updates and kube-apiserver
        # reconfiguration. cert-manager durations use Go-style units, so years must be
        # expressed in hours (10y = 87600h).
        duration: "87600h"
        # Renew 30 days before expiry. Shortening this increases control-plane maintenance
        # because kube-apiserver embeds this client credential in its audit webhook kubeconfig.
        renewBefore: "720h"
        # Leave empty to use the chart-generated Secret name.
        secretNameOverride: ""

# Redis/Valkey holds each GitTarget's watch resume cursors (warm restart) and, when attribution is
# enabled, the audit attribution facts. Empty by default: the chart runs in configured-author mode with
# no Redis (watches cold-replay on restart). Set addr to enable warm restarts; required when
# attribution.enabled is true.
queue:
  redis:
    # Redis/Valkey endpoint (host:port). Empty by default (no Redis, configured-author mode). Set to a
    # host:port for warm restarts; required when attribution.enabled is true.
    addr: ""
    auth:
      # Pre-existing Secret (same namespace) holding the Redis password. Empty by default (no Redis).
      # Set it when queue.redis.addr points at an authenticated Valkey; leave empty for a Valkey with
      # no auth.
      existingSecret: ""
      # Key within the Secret that holds the password value.
      existingSecretKey: "password"
      # Optional Redis username for ACL-based auth (Redis 6+). Not sensitive; stays as a plain value.
      username: ""
    db: 0
    # Root namespace for every key this release writes (cursors, attribution facts, command author
    # records). Give each reverser its own prefix to share one Redis/Valkey between more than the 16
    # logical databases `db` can separate. A Valkey ACL can enforce it (~<prefix>:*) rather than trust
    # it. Changing it orphans the keys written under the previous prefix: cursors then cold-replay
    # once, which is safe. Allowed characters: [A-Za-z0-9], '-', '_', '.' and ':'.
    keyPrefix: "gitops-reverser"
    tls:
      enabled: false

# Commit-author attribution from audit facts. Off by default so first-time installs can prove the
# Kubernetes-to-Git workflow without kube-apiserver audit webhook configuration. With it off, the
# operator runs configured-author (Redis optional — leave queue.redis.addr empty to run without it), and every mirrored-resource commit uses the
# configured committer.
attribution:
  # When true, run the audit webhook ingress and name commit authors from matching audit facts; requires
  # a non-empty queue.redis.addr. When false, run configured-author (no audit ingress, commits authored by
  # the committer); Redis is optional (leave queue.redis.addr empty to run without it).
  enabled: false
  # How long an attribution fact is retained waiting for the matching watch event to join it.
  ttl: "10m"
  # Bounded per-event wait for a matching audit fact before a watch event ships as the committer.
  # Larger values raise attribution hit-rate at the cost of commit latency.
  grace: "3s"

# RBAC configuration
rbac:
  create: true
  # Which types the reverser may read. It never writes to a watched type, so verbs are always
  # get/list/watch. Shape is enforced by values.schema.json; see docs/rbac.md.
  #
  #   any      cluster-wide read on everything, so a WatchRule can name any type — including
  #            one installed later. It also means the reverser can list and read every Secret
  #            in the cluster, credentials that have nothing to do with it included.
  #   selected read only the types below, so the reverser cannot list or watch Secrets at all.
  #            (The manager role keeps `get` on Secrets: it still reads the git-creds and
  #            age-key Secrets a GitProvider/GitTarget names.) A WatchRule naming a type you
  #            did not grant will fail to watch it. namespaces, CRDs and apiservices come from
  #            the manager role — do not restate them.
  watchTypes:
    mode: any # any | selected
    selected: []
    # - apiGroups: [""] # core group
    #   resources: ["configmaps"]
    # - apiGroups: ["apps"]
    #   resources: ["deployments"]

# Resource limits and requests
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 10m
    memory: 256Mi

# Node selection
nodeSelector: {}

# Tolerations
tolerations: []

# Pod affinity/anti-affinity (default anti-affinity for HA)
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: gitops-reverser
          topologyKey: kubernetes.io/hostname

# Pod disruption budget (enabled by default for HA)
podDisruptionBudget:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 1

# Monitoring and observability
monitoring:
  serviceMonitor:
    enabled: false
    namespace: ""
    labels: {}
    interval: 30s
    scrapeTimeout: 10s
    path: /metrics
    # Port name on the metrics Service (see templates/services.yaml)
    port: metrics
    # Must match the effective metrics transport:
    # - https when servers.metrics.tls.enabled=true
    # - http when servers.metrics.tls.enabled=false
    scheme: http

# Service exposure
service:
  # Optional fixed ClusterIP (useful for Kind/bootstrap environments before DNS is ready)
  clusterIP: ""
  ports:
    audit: 9444
    metrics: 8080

auditService:
  type: NodePort
  nodePort: 30444
  # Optional fixed ClusterIP for the dedicated audit Service. Useful for
  # "Option 1" bootstrap models where kube-apiserver talks directly to a pinned
  # Service IP and the control-plane host can route to the service CIDR.
  clusterIP: ""

# Guidance-only values used by Helm NOTES.txt for kube-apiserver follow-up.
auditKubeconfig:
  # When true, the generated example kubeconfig in Helm notes uses
  # insecure-skip-tls-verify: true instead of a CA bundle. This is useful for
  # local/bootstrap scenarios only and is not recommended for production.
  insecureSkipTLSVerify: false

# Optional starter resources for first-commit validation.
# Disabled by default so the chart does not create example Git objects unless
# you explicitly opt in.
quickstart:
  enabled: false
  # Namespace for the starter GitProvider, GitTarget, and WatchRule. Create it (and the git-creds
  # Secret) before installing, so the starter GitProvider is Ready on the first reconcile instead of
  # waiting up to ~5 minutes (RequeueSteadyInterval) for the Secret to appear.
  namespace: gitops-reverser-quickstart-demo
  # Let the chart create quickstart.namespace (Helm then owns it). Left false by default because the
  # recommended flow pre-creates the namespace and git-creds Secret before install; set true only if
  # the credentials Secret will be supplied some other way.
  createNamespace: false
  gitProvider:
    name: example-provider
    # Required when quickstart.enabled=true.
    url: ""
    allowedBranches:
      - "*"
    secretRef:
      # Required when quickstart.enabled=true.
      name: git-creds
    push:
      commitWindow: "5s"
  gitTarget:
    name: example-target
    branch: main
    # Required relative repository path for the starter GitTarget. The chart
    # default avoids repo-root writes; set "." only to deliberately target root.
    path: live-cluster
    encryption:
      provider: sops
      age:
        enabled: true
        generateWhenMissing: true
      secretRef:
        name: sops-age-key
  watchRule:
    name: example-watchrule
    rules:
      - operations:
          - CREATE
          - UPDATE
          - DELETE
        apiGroups:
          - ""
        apiVersions:
          - v1
        resources:
          - configmaps

# Logging configuration
logging:
  level: info
  development: false
  encoder: json
  # Additional logging configuration
  stacktraceLevel: error

labels:
  managedBy: Helm # Allows CI generated install.yaml creation (don't change when you are using Helm)
