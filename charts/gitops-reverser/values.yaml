# Default values for gitops-reverser.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# High Availability configuration - runs 1 replicas by default (HA support is not good enough yet)
replicaCount: 1
deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 0
    maxUnavailable: 1

image:
  repository: ghcr.io/configbutler/gitops-reverser
  pullPolicy: IfNotPresent
  tag: 0.28.0 # x-release-please-version

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
# Create the release namespace as part of chart rendering (useful for install.yaml workflows).
# Keep false for standard Helm installs where --create-namespace is preferred.
createNamespace: false

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532

# Controller manager configuration
controllerManager:
  # Health probe configuration
  healthProbe:
    bindAddress: :8081
  # Enable HTTP/2 (disabled by default for security)
  enableHTTP2: false
  # Extra Secret-shaped resources that must use the encrypted Git write path.
  # Entries are resource or group/resource, for example core.cozystack.io/tenantsecrets.
  additionalSensitiveResources: []

# HTTPS servers
servers:
  audit:
    listenAddress: 0.0.0.0
    port: 9444
    tls:
      # Serve audit ingress over HTTPS when true, HTTP when false.
      enabled: true
      certPath: "/tmp/k8s-audit-server/audit-server-certs"
      certName: "tls.crt"
      certKey: "tls.key"
      clientCAPath: "/tmp/k8s-audit-server/audit-client-ca"
      clientCAName: "tls.crt"
      # Leave empty to use the chart-generated Secret name.
      secretNameOverride: ""
    timeouts:
      read: "15s"
      write: "30s"
      idle: "60s"
    maxRequestBodyBytes: 10485760

  metrics:
    bindAddress: :8080
    port: 8080
    tls:
      # Serve metrics over HTTPS when true, HTTP when false.
      enabled: false
      certPath: "/tmp/k8s-metrics-server/metrics-server-certs"
      certName: "tls.crt"
      certKey: "tls.key"
      # Leave empty to use the chart-generated Secret name.
      secretNameOverride: ""

# Redis/Valkey is a required dependency: it holds each GitTarget's watch resume cursors (so work is
# re-picked up after a restart/reconnect) and, when attribution is enabled, the audit attribution facts.
queue:
  redis:
    # Redis/Valkey endpoint (host:port). Required — the operator refuses to start without it.
    addr: "valkey:6379"
    auth:
      # Pre-existing Secret (same namespace) holding the Redis password. Create it before install;
      # leave empty only for dev clusters where Valkey runs without authentication.
      existingSecret: "valkey-auth"
      # Key within the Secret that holds the password value.
      existingSecretKey: "password"
      # Optional Redis username for ACL-based auth (Redis 6+). Not sensitive; stays as a plain value.
      username: ""
    db: 0
    tls:
      enabled: false

# Commit-author attribution from audit facts. This is the only optional capability — with it off, the
# operator runs committer-only (still requires Redis), and every commit uses the configured committer.
attribution:
  # When true, run the audit webhook ingress and name commit authors from matching audit facts. When
  # false, run committer-only (no audit ingress, commits authored by the committer); Redis stays required.
  enabled: true
  # How long an attribution fact is retained waiting for the matching watch event to join it.
  ttl: "10m"
  # Bounded per-event wait for a matching audit fact before a watch event ships as the committer.
  # Larger values raise attribution hit-rate at the cost of commit latency.
  grace: "3s"

# TLS certificate management (Kubernetes requires this for API server callbacks)
certificates:
  name:
  certManager:
    enabled: true
    issuer:
      name: selfsigned-issuer
      kind: Issuer
      create: true
  audit:
    # When true, the chart creates audit root CA, audit server cert, and
    # kube-apiserver client cert resources via cert-manager. Set to false if
    # you want to provide those Secrets yourself.
    enabled: true
    rootCA:
      # Leave empty to use the chart-generated Secret name.
      secretNameOverride: ""
    client:
      # Keep the kube-apiserver client cert long-lived by default so cluster admins
      # are protected from frequent manual audit-webhook kubeconfig updates and
      # kube-apiserver reconfiguration. cert-manager durations use Go-style units,
      # so years must be expressed in hours (10y = 87600h).
      duration: "87600h"
      # Renew 30 days before expiry. Shortening this cadence increases control-plane
      # maintenance because kube-apiserver embeds this client credential in its
      # node-local audit webhook kubeconfig.
      renewBefore: "720h"
      # Leave empty to use the chart-generated Secret name.
      secretNameOverride: ""

# RBAC configuration
rbac:
  create: true

# Resource limits and requests
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 10m
    memory: 256Mi

# Node selection
nodeSelector: {}

# Tolerations
tolerations: []

# Pod affinity/anti-affinity (default anti-affinity for HA)
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: gitops-reverser
          topologyKey: kubernetes.io/hostname

# Pod disruption budget (enabled by default for HA)
podDisruptionBudget:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 1

# Monitoring and observability
monitoring:
  serviceMonitor:
    enabled: false
    namespace: ""
    labels: {}
    interval: 30s
    scrapeTimeout: 10s
    path: /metrics
    # Port name on the metrics Service (see templates/services.yaml)
    port: metrics
    # Must match the effective metrics transport:
    # - https when servers.metrics.tls.enabled=true
    # - http when servers.metrics.tls.enabled=false
    scheme: http

# Service exposure
service:
  # Optional fixed ClusterIP (useful for Kind/bootstrap environments before DNS is ready)
  clusterIP: ""
  ports:
    audit: 9444
    metrics: 8080

auditService:
  type: NodePort
  nodePort: 30444
  # Optional fixed ClusterIP for the dedicated audit Service. Useful for
  # "Option 1" bootstrap models where kube-apiserver talks directly to a pinned
  # Service IP and the control-plane host can route to the service CIDR.
  clusterIP: ""

# Guidance-only values used by Helm NOTES.txt for kube-apiserver follow-up.
auditKubeconfig:
  # When true, the generated example kubeconfig in Helm notes uses
  # insecure-skip-tls-verify: true instead of a CA bundle. This is useful for
  # local/bootstrap scenarios only and is not recommended for production.
  insecureSkipTLSVerify: false

# Optional starter resources for first-commit validation.
# Disabled by default so the chart does not create example Git objects unless
# you explicitly opt in.
quickstart:
  enabled: false
  # Namespace for the starter GitProvider, GitTarget, and WatchRule.
  # This namespace must already exist.
  namespace: default
  gitProvider:
    name: example-provider
    # Required when quickstart.enabled=true.
    url: ""
    allowedBranches:
      - "*"
    secretRef:
      # Required when quickstart.enabled=true.
      name: git-creds
    push:
      commitWindow: "5s"
  gitTarget:
    name: example-target
    branch: main
    # Required relative repository path for the starter GitTarget. The chart
    # default avoids repo-root writes; set "." only to deliberately target root.
    path: live-cluster
    encryption:
      provider: sops
      age:
        enabled: true
        generateWhenMissing: true
      secretRef:
        name: sops-age-key
  watchRule:
    name: example-watchrule
    rules:
      - operations:
          - CREATE
          - UPDATE
          - DELETE
        apiGroups:
          - ""
        apiVersions:
          - v1
        resources:
          - configmaps

# Logging configuration
logging:
  level: info
  development: false
  encoder: json
  # Additional logging configuration
  stacktraceLevel: error

labels:
  managedBy: Helm # Allows CI generated install.yaml creation (don't change when you are using Helm)
