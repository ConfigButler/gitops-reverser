# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

# Local-only overrides (e.g. DEV_IMG) are loaded from .env, which is gitignored.
# See .env.example for the available keys.
dotenv: ['.env']

# Default tasks to run once per invocation so the e2e DAG can fan tasks
# out via `deps:` without racing — e.g. `_cluster-ready` reachable through
# both `_image-loaded` and `_flux-installed` must not start twice.
run: once

set:
  - errexit
  - nounset
  - pipefail

includes:
  build:
    taskfile: ./Taskfile-build.yml
    dir: .
    flatten: true
  e2e:
    taskfile: ./test/e2e/Taskfile-e2e.yml
    dir: .
    flatten: true

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  help:
    desc: Display this help
    aliases:
      - list
    cmds:
      - task --list
    silent: true
