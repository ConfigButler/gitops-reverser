# A plain, non-templated CustomResourceDefinition. Files under crds/ are NOT
# rendered as Go templates by Helm: `{{ ... }}` here would be emitted literally.
# Helm installs these before the templates/ resources and never upgrades or
# deletes them. This is ordinary Kubernetes YAML that happens to live in a chart.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: widgets.example.com
spec:
  group: example.com
  scope: Namespaced
  names:
    plural: widgets
    singular: widget
    kind: Widget
    shortNames:
      - wdg
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - size
              properties:
                size:
                  type: string
                  enum:
                    - small
                    - medium
                    - large
                color:
                  type: string
                  default: blue
            status:
              type: object
              properties:
                phase:
                  type: string
      additionalPrinterColumns:
        - name: Size
          type: string
          jsonPath: .spec.size
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
