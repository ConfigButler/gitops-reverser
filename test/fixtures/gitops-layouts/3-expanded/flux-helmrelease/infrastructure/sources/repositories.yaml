# Multi-doc file holding three DIFFERENT chart-source kinds. All are cluster
# objects in the flux-system namespace; a HelmRelease points its chart at one.
#
# (a) A classic Helm HTTP index repository.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: ingress-nginx
  namespace: flux-system
spec:
  interval: 1h
  url: https://kubernetes.github.io/ingress-nginx
---
# (b) A HelmRepository in OCI mode: same kind as (a) but type: oci, so the URL is
# an oci:// registry namespace and the chart is chosen in the HelmRelease's
# chart block. Present here as an alternative source; not consumed in this
# fixture (frontend uses the OCIRepository below instead).
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: podinfo
  namespace: flux-system
spec:
  interval: 1h
  type: oci
  url: oci://ghcr.io/stefanprodan/charts
---
# (c) An OCIRepository: a DIFFERENT kind that pins one chart artifact by tag.
# The frontend HelmRelease references this via spec.chartRef.
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: podinfo
  namespace: flux-system
spec:
  interval: 10m
  url: oci://ghcr.io/stefanprodan/charts/podinfo
  ref:
    tag: 6.7.1
