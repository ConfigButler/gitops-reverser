# HelmRelease for ingress-nginx. It lives in flux-system but deploys the chart
# INTO the ingress-nginx namespace (spec.targetNamespace). This one HelmRelease
# demonstrates four of the five value-delivery mechanisms in this fixture.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: flux-system
spec:
  interval: 30m
  releaseName: ingress-nginx
  targetNamespace: ingress-nginx
  storageNamespace: ingress-nginx
  chart:
    spec:
      chart: ingress-nginx
      version: 4.11.3
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
  install:
    createNamespace: true
  # MECHANISM 1: inline values, checked straight into this file.
  values:
    controller:
      service:
        type: LoadBalancer
      metrics:
        enabled: true
  valuesFrom:
    # MECHANISM 2: merge a whole values document from a ConfigMap in this folder
    # (values-configmap.yaml). Later entries win over spec.values above.
    - kind: ConfigMap
      name: ingress-nginx-values
      valuesKey: values.yaml
    # MECHANISM 3: merge sensitive values from a Secret created OUT OF BAND. The
    # Secret is intentionally NOT committed to this repo (see README); optional
    # keeps reconciliation from failing before an operator/SOPS creates it.
    - kind: Secret
      name: ingress-nginx-secret-values
      valuesKey: values.yaml
      optional: true
    # MECHANISM 4: splice a SINGLE scalar. Take the raw string at .data.replicas
    # in the ConfigMap and write it into spec.values at controller.replicaCount.
    - kind: ConfigMap
      name: ingress-nginx-tuning
      valuesKey: replicas
      targetPath: controller.replicaCount
