# Plain checked-in Kubernetes object: the base Deployment for the frontend app.
# The per-cluster overlays under apps/staging and apps/production patch this
# document; they never rewrite it in place.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/example-org/frontend:1.8.3
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
