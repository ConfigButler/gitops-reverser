# A cert-manager ClusterIssuer: a real cluster-scoped custom resource. It depends
# on the cert-manager CRDs installed by the controllers layer, which is why the
# Flux Kustomization for configs dependsOn the one for controllers.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: platform@example-org.dev
    privateKeySecretRef:
      name: letsencrypt-production-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
