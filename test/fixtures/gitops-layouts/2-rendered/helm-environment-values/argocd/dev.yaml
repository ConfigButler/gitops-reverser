# Argo CD Application for the dev environment. This IS a Kubernetes object (an
# Argo CD control-plane CRD). Its Helm source layers value files in order and
# then applies an inline parameter that wins over all of them.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example-org/gitops.git
    targetRevision: main
    path: chart
    helm:
      # Applied lowest-to-highest precedence: a later file overrides an earlier
      # one, and both override the chart's own values.yaml.
      valueFiles:
        - ../values/common.yaml
        - ../values/dev.yaml
      # Inline parameter: highest precedence of all, overrides any value file.
      parameters:
        - name: image.tag
          value: "1.8.3-rc.4"
  destination:
    server: https://kubernetes.default.svc
    namespace: frontend-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
