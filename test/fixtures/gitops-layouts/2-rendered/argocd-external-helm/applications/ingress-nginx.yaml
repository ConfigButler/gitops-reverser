apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
spec:
  project: default
  # Multiple sources: the chart is pulled from the upstream Helm repo, while the
  # value files are read from this Git repo via the `$values` ref below.
  sources:
    - repoURL: https://kubernetes.github.io/ingress-nginx
      chart: ingress-nginx
      targetRevision: 4.11.3
      helm:
        valueFiles:
          - $values/values/ingress-nginx/common.yaml
          - $values/values/ingress-nginx/production.yaml
    # This source carries no chart and no path; it exists only so the value
    # files above can be resolved through the `values` ref.
    - repoURL: https://github.com/example-org/gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
