# Argo CD Application. Its source path is rendered/production — the generated
# output — never src/. Argo CD applies the committed artifacts verbatim.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-production
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example-org/gitops.git
    targetRevision: main
    path: rendered/production
  destination:
    server: https://kubernetes.default.svc
    namespace: frontend-production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
