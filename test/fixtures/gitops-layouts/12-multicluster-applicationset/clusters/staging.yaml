apiVersion: v1
kind: Secret
metadata:
  name: staging
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
    # environment=staging, so the ApplicationSet's environment=production selector
    # does NOT match this cluster. It is registered but participates in nothing here.
    environment: staging
    region: eu-west-1
type: Opaque
stringData:
  name: staging
  server: https://staging.k8s.example.com:6443
  # The bearerToken below is intentionally fake — this is a fixture, never a real credential.
  config: |
    {
      "bearerToken": "not-a-real-token",
      "tlsClientConfig": {
        "insecure": false,
        "caData": "LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t"
      }
    }
