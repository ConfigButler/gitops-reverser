# Helm template. Despite the .yaml extension this is NOT valid YAML on its own:
# the Go template actions below must be rendered by Helm before it becomes a
# Kubernetes Deployment. Parsing it as plain YAML will fail.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tenant-app.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "tenant-app.name" . }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "tenant-app.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "tenant-app.name" . }}
    spec:
      containers:
        - name: app
          image: {{ .Values.image | quote }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
