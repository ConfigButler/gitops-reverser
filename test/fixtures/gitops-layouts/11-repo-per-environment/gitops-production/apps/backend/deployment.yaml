apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: backend-production
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: storefront
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/example-org/backend:2.4.0
          ports:
            - name: grpc
              containerPort: 9090
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
