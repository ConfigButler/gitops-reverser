apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: backend-dev
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: storefront
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/example-org/backend:2.3.8
          ports:
            - name: grpc
              containerPort: 9090
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
