# TRAP: `kustomization.yaml` is the filename kustomize reserves for its build
# config (kustomize.config.k8s.io/v1beta1). This file is instead a Flux
# Kustomization custom resource (kustomize.toolkit.fluxcd.io/v1) — a real
# Kubernetes object the API server stores and reconciles. Same reserved
# filename, entirely different API and meaning. (Fixture 09's collision, hostile.)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  # Points at ./mixed, a directory that does exist here, so the only trap in this
  # file is the filename collision above - not a dangling path.
  path: ./mixed
  prune: true
  # The GitRepository named `gitops` is NOT defined anywhere in this fixture. That
  # is deliberate and realistic: a Flux Kustomization names a source object that
  # lives in the cluster, created from some other folder or out of band entirely.
  # A reference resolving outside the folder is normal, not a defect.
  sourceRef:
    kind: GitRepository
    name: gitops
