# TRAP: Helm values sitting beside real manifests. This is NOT a Kubernetes
# object — no apiVersion, no kind. It is input to `helm template`, and is
# meaningless to `kubectl apply`. YAML does not imply a manifest.
replicaCount: 3
image:
  repository: ghcr.io/example-org/frontend
  tag: 1.8.3
resources:
  requests:
    cpu: 50m
    memory: 64Mi
service:
  type: ClusterIP
  port: 80
