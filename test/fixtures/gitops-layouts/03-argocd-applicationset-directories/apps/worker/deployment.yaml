apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: worker
  labels:
    app.kubernetes.io/name: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/example-org/worker:0.9.1
          command:
            - /worker
          args:
            - --queue=default
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
