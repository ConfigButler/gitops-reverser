apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: frontend-production
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: storefront
spec:
  # replicas=3 here, but dev has 1 and staging has 2. This field has drifted across
  # the three repos and there is no shared base in Git to reconcile it against.
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/example-org/frontend:1.8.3
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
