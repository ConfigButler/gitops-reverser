# COLLISION WARNING: named apps.yaml, but this is a Flux Kustomization CUSTOM
# RESOURCE (kustomize.toolkit.fluxcd.io/v1), not a kustomize.config.k8s.io build
# file. It points the kustomize-controller at ./apps/staging.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  # apps reconcile only after infrastructure is Ready: controllers before apps.
  dependsOn:
    - name: infrastructure
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/staging
  prune: true
  targetNamespace: staging
