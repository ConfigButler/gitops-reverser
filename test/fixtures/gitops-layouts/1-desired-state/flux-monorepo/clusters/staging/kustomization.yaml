# Kustomize build file (kustomize.config.k8s.io), NOT a cluster object. The
# staging cluster ROOT that the flux-system Kustomization points its path at.
# Its resources are themselves Flux Kustomization CRs plus the bootstrap dir.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - flux-system
  - infrastructure.yaml
  - apps.yaml
