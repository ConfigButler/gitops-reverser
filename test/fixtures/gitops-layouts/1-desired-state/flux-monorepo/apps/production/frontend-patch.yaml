# Strategic-merge patch: a PARTIAL object, not a full manifest. It carries only
# the fields that differ in production and relies on the base for everything else.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 4
  template:
    spec:
      containers:
        - name: frontend
          image: ghcr.io/example-org/frontend:1.8.3
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
