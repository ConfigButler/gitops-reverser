apiVersion: v1
kind: Secret
metadata:
  name: flux-web-config
  namespace: flux-system
type: Opaque
stringData:
  config.yaml: |
    apiVersion: web.fluxcd.controlplane.io/v1
    kind: Config
    spec:
      distribution:
        registry:
        version:
      authentication:
        type: Anonymous
        anonymous:
          username: flux-viewer
          groups:
            - flux-readonly
