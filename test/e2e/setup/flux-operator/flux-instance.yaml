apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: flux
  namespace: flux-system
spec:
  distribution:
    version: "${FLUX_VERSION}"  # Rendered by the e2e `_flux-installed` task via envsubst from ${FLUX_VERSION} (defined in .devcontainer/Dockerfile)
    registry: ghcr.io/fluxcd
  components:
    - source-controller
    - kustomize-controller
    - helm-controller
    - notification-controller
  cluster:
    type: kubernetes
    size: medium
    networkPolicy: true
    multitenant: false
    domain: cluster.local
