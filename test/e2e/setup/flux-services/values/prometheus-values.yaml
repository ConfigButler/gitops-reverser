# kube-prometheus-stack values for the shared e2e Prometheus instance.
# Keep this operator install small and deterministic for local/CI bootstrap.

fullnameOverride: prometheus-shared-e2e
nameOverride: prometheus-shared-e2e
cleanPrometheusOperatorObjectNames: true

defaultRules:
  create: false

alertmanager:
  enabled: false

grafana:
  enabled: false

kubeApiServer:
  enabled: false

kubeControllerManager:
  enabled: false

coreDns:
  enabled: false

kubeEtcd:
  enabled: false

kubelet:
  enabled: false

kubeProxy:
  enabled: false

kubeScheduler:
  enabled: false

kubeStateMetrics:
  enabled: false

nodeExporter:
  enabled: false

prometheus-node-exporter:
  enabled: false

prometheus-windows-exporter:
  enabled: false

prometheus:
  serviceAccount:
    create: true
    name: prometheus-shared-e2e
  prometheusSpec:
    replicas: 1
    retention: 2h
    scrapeInterval: 5s
    evaluationInterval: 5s
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector:
      matchLabels:
        monitoring.configbutler.ai/instance: gitops-reverser
    serviceMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}
    ruleSelectorNilUsesHelmValues: false
    ruleSelector: {}
    ruleNamespaceSelector: {}
    probeSelectorNilUsesHelmValues: false
    probeSelector: {}
    probeNamespaceSelector: {}
    scrapeConfigSelectorNilUsesHelmValues: false
    scrapeConfigSelector: {}
    scrapeConfigNamespaceSelector: {}
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  additionalServiceMonitors:
    - name: gitops-reverser
      additionalLabels:
        monitoring.configbutler.ai/instance: gitops-reverser
      jobLabel: app.kubernetes.io/name
      namespaceSelector:
        any: true
      selector:
        matchLabels:
          app.kubernetes.io/name: gitops-reverser
      endpoints:
        - port: metrics
          path: /metrics
          scheme: http
          interval: 5s
          scrapeTimeout: 4s
