apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - includeSelectors: false
    pairs:
      e2e.configbutler.io/stack: services

resources:
  - namespaces/cert-manager.yaml
  - namespaces/gitea-e2e.yaml
  - namespaces/prometheus-operator.yaml
  - namespaces/valkey-e2e.yaml
  - repositories/jetstack.yaml
  - repositories/gitea-charts.yaml
  - repositories/prometheus-community.yaml
  - repositories/valkey.yaml
  - releases/cert-manager.yaml
  - releases/gitea.yaml
  - releases/prometheus.yaml
  - releases/valkey.yaml

generatorOptions:
  disableNameSuffixHash: true
  labels:
    reconcile.fluxcd.io/watch: Enabled

configMapGenerator:
  - name: gitea-values
    namespace: gitea-e2e
    files:
      - values.yaml=values/gitea-values.yaml
  - name: prometheus-values
    namespace: prometheus-operator
    files:
      - values.yaml=values/prometheus-values.yaml
  - name: valkey-values
    namespace: valkey-e2e
    files:
      - values.yaml=values/valkey-values.yaml
