apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: api-ratelimit
  namespace: vote
spec:
  rateLimit:
    # High ceiling for now — easy to tune down for production.
    # At 10 000 avg/s per source IP, this is effectively unlimited for a
    # 100-person audience while still giving us a known control point.
    average: 10000
    burst: 1000
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: auth-forwarder
  namespace: vote
spec:
  forwardAuth:
    address: http://auth-service.vote.svc.cluster.local:8080/private/forward-auth-decision
    trustForwardHeader: true
    maxResponseBodySize: 65536
    authResponseHeaders:
      - Authorization
    addAuthCookiesToResponse: 
      - auth_session
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: kube-apiserver-transport
  namespace: default
spec:
  rootCAs:
    - configMap: kube-root-ca.crt
  serverName: kubernetes.default.svc
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kube-api-examples-only
  namespace: vote
spec:
  entryPoints:
    - web
  routes:
    # All Kubernetes API paths. auth-forwarder handles both browser (mints a token via
    # session cookie / join code) and kubectl (validates and passes through bearer token).
    - match: Host(`vote.reversegitops.dev`) && (PathPrefix(`/api`) || PathPrefix(`/apis`) || PathPrefix(`/openapi`))
      kind: Rule
      middlewares:
        - name: api-ratelimit
        - name: auth-forwarder
      services:
        - name: kubernetes
          namespace: default
          port: 443
          scheme: https
          serversTransport: default-kube-apiserver-transport@kubernetescrd
---
