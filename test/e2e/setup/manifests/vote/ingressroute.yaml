apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: podinfo-add-trailing-slash
  namespace: vote
spec:
  redirectRegex:
    regex: ^https?://([^/]+)/podinfo$
    replacement: https://${1}/podinfo/
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: podinfo-strip-prefix
  namespace: vote
spec:
  stripPrefix:
    prefixes:
      - /podinfo
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vote-public
  namespace: vote
spec:
  entryPoints:
  - web
  routes:
  - match: Host(`vote.reversegitops.dev`) && Path(`/podinfo`)
    kind: Rule
    middlewares:
    - name: ratelimit
      namespace: cloudflared-public
    - name: podinfo-add-trailing-slash
    services:
    - name: podinfo
      port: 80
  - match: Host(`vote.reversegitops.dev`) && PathPrefix(`/podinfo/`)
    kind: Rule
    middlewares:
    - name: ratelimit
      namespace: cloudflared-public
    - name: podinfo-strip-prefix
    services:
    - name: podinfo
      port: 80
