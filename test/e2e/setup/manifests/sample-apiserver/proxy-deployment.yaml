apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-pass-through-proxy
  namespace: wardle
  labels:
    apiserver-proxy: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      apiserver-proxy: "true"
  template:
    metadata:
      labels:
        apiserver-proxy: "true"
    spec:
      containers:
        - name: audit-pass-through-proxy
          image: audit-pass-through-apiserver:e2e-local
          imagePullPolicy: IfNotPresent
          args:
            - --listen-address=:9445
            - --backend-url=https://api-backend.wardle.svc.cluster.local:443
            - --backend-insecure-skip-verify
            - --backend-client-cert-file=/etc/audit-pass-through/backend-client/tls.crt
            - --backend-client-key-file=/etc/audit-pass-through/backend-client/tls.key
            - --backend-server-name=api-backend.wardle.svc.cluster.local
            - --webhook-kubeconfig=/etc/audit-pass-through/webhook/kubeconfig
            - --webhook-timeout=5s
            - --max-audit-body-bytes=1048576
            - --capture-temp-dir=/tmp
            - --tls-cert-file=/etc/audit-pass-through/tls/tls.crt
            - --tls-private-key-file=/etc/audit-pass-through/tls/tls.key
          ports:
            - containerPort: 9445
              name: https
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /livez
              port: 9445
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9445
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /tmp
              name: tmp
            - mountPath: /etc/audit-pass-through/tls
              name: serving-tls
              readOnly: true
            - mountPath: /etc/audit-pass-through/backend-client
              name: backend-client
              readOnly: true
            - mountPath: /etc/audit-pass-through/webhook
              name: webhook-kubeconfig
              readOnly: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - emptyDir: {}
          name: tmp
        - name: serving-tls
          secret:
            secretName: audit-pass-through-proxy-serving-cert
        - name: backend-client
          secret:
            secretName: audit-pass-through-backend-client-cert
        - name: webhook-kubeconfig
          secret:
            secretName: audit-pass-through-webhook-kubeconfig
