apiVersion: apps/v1
kind: Deployment
metadata:
  name: wardle-server
  namespace: wardle
  labels:
    apiserver: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      apiserver: "true"
  template:
    metadata:
      labels:
        apiserver: "true"
    spec:
      serviceAccountName: apiserver
      containers:
        - name: wardle-server
          image: registry.k8s.io/e2e-test-images/sample-apiserver:1.33.8
          imagePullPolicy: IfNotPresent
          args:
            - --etcd-servers=http://localhost:2379
            - --client-ca-file=/etc/wardle/proxy-client-ca/tls.crt
          volumeMounts:
            - mountPath: /etc/wardle/proxy-client-ca
              name: proxy-client-ca
              readOnly: true
        - name: etcd
          image: registry.k8s.io/etcd:v3.6.8
          imagePullPolicy: IfNotPresent
      volumes:
        - name: proxy-client-ca
          secret:
            secretName: audit-pass-through-backend-client-ca
