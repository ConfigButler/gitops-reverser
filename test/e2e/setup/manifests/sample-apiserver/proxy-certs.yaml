apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: audit-pass-through-proxy-selfsigned
  namespace: wardle
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: audit-pass-through-proxy-serving-cert
  namespace: wardle
spec:
  dnsNames:
    - api
    - api.wardle
    - api.wardle.svc
    - api.wardle.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: audit-pass-through-proxy-selfsigned
  privateKey:
    rotationPolicy: Always
  secretName: audit-pass-through-proxy-serving-cert
  usages:
    - digital signature
    - key encipherment
    - server auth
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: audit-pass-through-backend-client-ca
  namespace: wardle
spec:
  commonName: audit-pass-through-backend-client-ca
  isCA: true
  issuerRef:
    kind: Issuer
    name: audit-pass-through-proxy-selfsigned
  privateKey:
    algorithm: ECDSA
    rotationPolicy: Always
    size: 256
  secretName: audit-pass-through-backend-client-ca
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: audit-pass-through-backend-client-ca-issuer
  namespace: wardle
spec:
  ca:
    secretName: audit-pass-through-backend-client-ca
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: audit-pass-through-backend-client-cert
  namespace: wardle
spec:
  commonName: audit-pass-through-proxy
  issuerRef:
    kind: Issuer
    name: audit-pass-through-backend-client-ca-issuer
  privateKey:
    rotationPolicy: Always
  secretName: audit-pass-through-backend-client-cert
  subject:
    organizations:
      - system:masters
  usages:
    - digital signature
    - client auth
