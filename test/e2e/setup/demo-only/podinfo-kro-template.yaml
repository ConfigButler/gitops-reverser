apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: podinfo-app
spec:
  schema:
    apiVersion: v1alpha1
    kind: PodInfoApp
    spec:
      message: string | default="hello from kro"
      color: string | default="#34577c"
      logoURL: string | default=""
      replicas: integer | default=1 minimum=1 maximum=1 description="Number of replicas — keep at 1 during demo to avoid exhausting cluster resources"
    status:
      availableReplicas: ${deployment.status.availableReplicas}
      ready: ${deployment.status.availableReplicas >= 1}
      url: ${"https://demo.configbutler.ai/" + deployment.metadata.namespace.replace("-production", "") + "/" + deployment.metadata.name + "/"}
    additionalPrinterColumns:
      - name: URL
        type: string
        jsonPath: .status.url
  resources:
    - id: gateway   # Trying to include this is a trick to only expand in namespaces that also would serve traffic
      externalRef:
        apiVersion: traefik.io/v1alpha1
        kind: IngressRoute
        metadata:
          name: podinfos-gateway
    - id: deployment
      readyWhen:
        - "${deployment.status.availableReplicas >= 1}"
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.namespace}
          labels:
            app.kubernetes.io/name: ${schema.metadata.name}
            configbutler.ai/path-prefix: ${gateway.metadata.labels["configbutler.ai/path-prefix"]}
        spec:
          replicas: ${schema.spec.replicas}
          selector:
            matchLabels:
              app.kubernetes.io/name: ${schema.metadata.name}
          template:
            metadata:
              labels:
                app.kubernetes.io/name: ${schema.metadata.name}
                configbutler.ai/path-prefix: ${gateway.metadata.labels["configbutler.ai/path-prefix"]}
            spec:
              containers:
              - name: podinfo
                image: ghcr.io/stefanprodan/podinfo:6.11.1
                imagePullPolicy: IfNotPresent
                env:
                - name: PODINFO_UI_MESSAGE
                  value: ${schema.spec.message}
                - name: PODINFO_UI_COLOR
                  value: ${schema.spec.color}
                - name: PODINFO_UI_LOGO
                  value: ${schema.spec.logoURL}
                ports:
                - name: http
                  containerPort: 9898
                readinessProbe:
                  httpGet:
                    path: /readyz
                    port: http
                  initialDelaySeconds: 3
                  periodSeconds: 10
                livenessProbe:
                  httpGet:
                    path: /healthz
                    port: http
                  initialDelaySeconds: 10
                  periodSeconds: 10
                resources:
                  requests:
                    cpu: 10m
                    memory: 32Mi
                  limits:
                    cpu: 10m
                    memory: 32Mi
    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.namespace}
          labels:
            app.kubernetes.io/name: ${schema.metadata.name}
            configbutler.ai/path-prefix: ${gateway.metadata.labels["configbutler.ai/path-prefix"]}
        spec:
          selector:
            app.kubernetes.io/name: ${schema.metadata.name}
          ports:
          - name: http
            port: 80
            targetPort: http
    - id: ingressroute
      template:
        apiVersion: traefik.io/v1alpha1
        kind: IngressRoute
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.namespace}
          labels:
            app.kubernetes.io/name: ${schema.metadata.name}
            configbutler.ai/path-prefix: ${gateway.metadata.labels["configbutler.ai/path-prefix"]}
        spec:
          parentRefs:
          - name: podinfos-gateway
          routes:
          - match: PathPrefix(`/${schema.metadata.name}`)
            kind: Rule
            middlewares:
            - name: strip-appname
            services:
            - name: ${schema.metadata.name}
              port: 80
