apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: podinfos-add-trailing-slash
  namespace: podinfos-production
spec:
  redirectRegex:
    regex: ^https?://([^/]+)/podinfos/([^/]+)$
    replacement: https://${1}/podinfos/${2}/
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: podinfos-strip-prefix
  namespace: podinfos-production
spec:
  stripPrefixRegex:
    regex:
      - /podinfos/[^/]+
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: ratelimit
  namespace: podinfos-production
spec:
  rateLimit:
    average: 10
    burst: 5
