apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: voter
  namespace: flux-system
spec:
  interval: 10m
  timeout: 1m
  url: https://github.com/sunib/voter.git
  ref:
    branch: coffee
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: voter
  namespace: flux-system
spec:
  interval: 10m
  timeout: 5m
  path: ./k8s
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: voter
