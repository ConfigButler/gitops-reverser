apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: frontend-static
  namespace: vote
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`demo.configbutler.ai`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: vote-frontend
          port: http
          scheme: http
  
