apiVersion: configbutler.ai/v1alpha1
kind: GitProvider
metadata:
  name: demo
spec:
  url: http://gitea-http.gitea-e2e.svc.cluster.local:13000/testorg/demo.git
  allowedBranches:
    - main
    - holland-stuff
  push:
    interval: "5s"
    maxCommits: 30
  secretRef:
    name: git-creds-demo
---
apiVersion: configbutler.ai/v1alpha1
kind: GitTarget
metadata:
  name: demo-podinfos
spec:
  providerRef:
    kind: GitProvider
    name: demo
  branch: holland-stuff
  path: podinfos
---
apiVersion: configbutler.ai/v1alpha1
kind: WatchRule
metadata:
  name: demo-podinfos
spec:
  targetRef:
    kind: GitTarget
    name: demo-podinfos
  rules:
    - operations: [CREATE, UPDATE, DELETE]
      apiGroups: ["kro.run"]
      apiVersions: ["v1alpha1"]
      resources: ["podinfoapps"]
