apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: podinfos-intent

resources:
  - 0-ns.yaml
  - ../podinfos-gitops
  - 2-reverse-gitops.yaml

patches:
  - target:
      group: source.toolkit.fluxcd.io
      version: v1
      kind: GitRepository
      name: demo
    patch: |-
      - op: replace
        path: /spec/ref/branch
        value: holland-stuff
  - target:   # Turn the normal GitOps off for now -> We can enable it for the demo, but it will create race conditions otherwise...
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: demo-podinfos
    patch : |-
      - op: replace
        path: /spec/suspend
        value: true
      - op: replace
        path: /spec/targetNamespace
        value: podinfos-intent
