apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: apiservice-audit-proxy
  namespace: flux-system
spec:
  interval: 24h
  url: oci://ghcr.io/configbutler/charts/apiservice-audit-proxy
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    semver: 0.4.0
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: aggregated-api
  namespace: aggregated-api
spec:
  interval: 60m
  timeout: 10m
  # This release renders cert-manager Issuer/Certificate resources (tls.mode:
  # cert-manager below), so it must not install until cert-manager's CRDs and
  # webhook are ready. Without this, kubectl apply -k fires both releases in
  # parallel and aggregated-api's helm install races cert-manager: if the CRDs
  # aren't established yet the install fails, exhausts its 3 remediation
  # retries, and the release stays not-Ready until the next 60m interval —
  # which times out wait-flux-services.sh on helmreleases/aggregated-api.
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  chartRef:
    kind: OCIRepository
    name: apiservice-audit-proxy
    namespace: flux-system
  install:
    createNamespace: false
    disableWait: true
    remediation:
      retries: 3
  upgrade:
    disableWait: true
    remediation:
      retries: 3
  values:
    server:
      apiService:
        enabled: true
        group: wardle.example.com
        name: v1alpha1.wardle.example.com
        version: v1alpha1
      tls:
        mode: cert-manager
        certManager:
          createSelfSignedIssuer: true
          selfSignedIssuerName: audit-pass-through-proxy-selfsigned
          issuerRef:
            group: cert-manager.io
            kind: Issuer
            name: audit-pass-through-proxy-selfsigned
          certificateName: audit-pass-through-proxy-serving-cert
          secretName: audit-pass-through-proxy-serving-cert

    backend:
      url: https://api-backend.aggregated-api.svc:443
      tls:
        insecureSkipVerify: false
        serverName: api-backend.aggregated-api.svc
        caSecretName: audit-pass-through-backend-serving-ca
      identity:
        mode: impersonation
        impersonation:
          rbac:
            create: true
      testApiserver:
        enabled: true
        nameOverride: api-backend
        backendServingCert:
          enabled: true
          selfSignedIssuerName: audit-pass-through-backend-serving-selfsigned
          caSecretName: audit-pass-through-backend-serving-ca
          caIssuerName: audit-pass-through-backend-serving-ca-issuer
          certSecretName: audit-pass-through-backend-serving-cert

    audit:
      webhook:
        kubeconfigSecretName: audit-pass-through-webhook-kubeconfig
      testWebhookReceiver:
        enabled: false
