apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prometheus-operator
  namespace: flux-system
spec:
  interval: 30m
  timeout: 5m
  path: ./
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: prometheus-operator
  targetNamespace: prometheus-operator
