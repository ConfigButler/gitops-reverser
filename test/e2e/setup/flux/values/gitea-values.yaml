# Gitea Helm values for e2e testing.
# Optimized for speed and CI environments.

# Pull the Gitea image from Docker Hub instead of the chart's default
# docker.gitea.com. That registry became unreachable from the devcontainer and
# from CI (connect timeout to 35.91.213.186:443), which fails the whole suite in
# BeforeSuite with `Ran 0 of N Specs`: the gitea pod sits in Init:ImagePullBackOff
# and nothing else can start. The chart source, dl.gitea.com, is a separate host
# and is fine, so only the registry moves.
#
# Same image, verified rather than assumed: docker.io/gitea/gitea:1.27.0-rootless
# is sha256:414ba5b2b1163480e9ed4213a989cd798579cfa88582a2359303273009b2b852,
# published by the Gitea org for amd64 and arm64.
#
# `repository` has to move with the registry. The chart composes
# `registry/repository`, and its default pair is `docker.gitea.com` + `gitea`;
# on Docker Hub the org is part of the path, so it is `gitea/gitea`. Setting only
# the registry renders `docker.io/gitea`, which is a different (nonexistent)
# image, and the render is the only place that shows it.
#
# The tag is still left to the chart, which derives it from appVersion and
# appends `-rootless`, so a chart bump still moves the image.
#
# This trades one availability risk for another: Docker Hub rate-limits anonymous
# pulls per IP, and CI runners share addresses. A pull-through cache fixes both
# and is the intended follow-up; until then a rate-limit failure looks like this
# same ImagePullBackOff, so check the kubelet event before suspecting the suite.
image:
  registry: docker.io
  repository: gitea/gitea

persistence:
  enabled: false

memcached:
  enabled: false
postgresql-ha:
  enabled: false
redis-cluster:
  enabled: false
valkey-cluster:
  enabled: false
mysql:
  enabled: false

gitea:
  config:
    database:
      DB_TYPE: sqlite3
      PATH: "/data/gitea/gitea.db"
    server:
      PROTOCOL: http
      HTTP_PORT: 13000
      DOMAIN: gitea-http.gitea-e2e.svc.cluster.local
      ROOT_URL: "http://gitea-http.gitea-e2e.svc.cluster.local:13000/"
      SSH_DOMAIN: gitea-ssh.gitea-e2e.svc.cluster.local
      SSH_PORT: 22
      START_SSH_SERVER: true
    security:
      INSTALL_LOCK: true
      SECRET_KEY: "e2e-test-secret-key-not-for-production"
    service:
      DISABLE_REGISTRATION: true
      DEFAULT_KEEP_EMAIL_PRIVATE: true
    repository:
      DEFAULT_BRANCH: main
    i18n:
      LANGS: en-US
      NAMES: English
    indexer:
      ISSUE_INDEXER_TYPE: bleve
      REPO_INDEXER_ENABLED: false
    mailer:
      ENABLED: false
    webhook:
      ALLOWED_HOST_LIST: "*"
  admin:
    username: giteaadmin
    password: giteapassword123
    email: admin@example.com

service:
  http:
    type: ClusterIP
    port: 13000
  ssh:
    type: ClusterIP
    port: 22

resources:
  limits:
    memory: "1024Mi"
  requests:
    memory: "512Mi"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
