# Gitea Helm values for e2e testing.
# Optimized for speed and CI environments.

persistence:
  enabled: false

memcached:
  enabled: false
postgresql-ha:
  enabled: false
redis-cluster:
  enabled: false
valkey-cluster:
  enabled: false
mysql:
  enabled: false

gitea:
  config:
    database:
      DB_TYPE: sqlite3
      PATH: "/data/gitea/gitea.db"
    server:
      PROTOCOL: http
      HTTP_PORT: 13000
      DOMAIN: gitea-http.gitea-e2e.svc.cluster.local
      ROOT_URL: "http://gitea-http.gitea-e2e.svc.cluster.local:13000/"
      SSH_DOMAIN: gitea-ssh.gitea-e2e.svc.cluster.local
      SSH_PORT: 22
      START_SSH_SERVER: true
    security:
      INSTALL_LOCK: true
      SECRET_KEY: "e2e-test-secret-key-not-for-production"
    service:
      DISABLE_REGISTRATION: true
      DEFAULT_KEEP_EMAIL_PRIVATE: true
    repository:
      DEFAULT_BRANCH: main
    i18n:
      LANGS: en-US
      NAMES: English
    indexer:
      ISSUE_INDEXER_TYPE: bleve
      REPO_INDEXER_ENABLED: false
    mailer:
      ENABLED: false
    webhook:
      ALLOWED_HOST_LIST: "*"
  admin:
    username: giteaadmin
    password: giteapassword123
    email: admin@example.com

service:
  http:
    type: ClusterIP
    port: 13000
  ssh:
    type: ClusterIP
    port: 22

resources:
  limits:
    memory: "1024Mi"
  requests:
    memory: "512Mi"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
