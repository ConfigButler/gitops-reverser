# Valkey Helm values for e2e testing.
# Standalone mode, no persistence, minimal resources, auth enabled.

architecture: standalone

# Disable persistence for fast, ephemeral testing
primary:
  persistence:
    enabled: false
  resources:
    limits:
      memory: "256Mi"
    requests:
      memory: "128Mi"

# Auth enabled. Password from pre-created valkey-auth secret.
# The fixed password is intentional for test environments — not a security concern.
auth:
  enabled: true
  usersExistingSecret: valkey-auth
  aclUsers:
    default:
      permissions: "~* &* +@all"
      passwordKey: password
