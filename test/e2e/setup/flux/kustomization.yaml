apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespaces/cert-manager.yaml
  - namespaces/gitea-e2e.yaml
  - namespaces/prometheus-operator.yaml
  - namespaces/valkey-e2e.yaml
  - repositories/prometheus-operator.yaml
  - repositories/jetstack.yaml
  - repositories/gitea-charts.yaml
  - repositories/valkey.yaml
  - releases/ingress.yaml
  - releases/prometheus-operator.yaml
  - releases/cert-manager.yaml
  - releases/gitea.yaml
  - releases/valkey.yaml
  - releases/kro.yaml
  - releases/reflector.yaml

generatorOptions:
  disableNameSuffixHash: true
  labels:
    reconcile.fluxcd.io/watch: Enabled

configMapGenerator:
  - name: gitea-values
    namespace: gitea-e2e
    files:
      - values.yaml=values/gitea-values.yaml
  - name: valkey-values
    namespace: valkey-e2e
    files:
      - values.yaml=values/valkey-values.yaml

secretGenerator:
  - name: valkey-auth
    namespace: valkey-e2e
    literals:
      - password=e2e-valkey-password
    options:
      disableNameSuffixHash: true
