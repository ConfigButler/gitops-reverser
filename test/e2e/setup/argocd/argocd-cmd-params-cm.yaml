apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
data:
  # Serve the UI/API over plain HTTP. argocd-server otherwise terminates TLS with
  # a self-signed cert, which turns `kubectl port-forward` + browser into a
  # redirect-loop and cert-warning exercise. Wired to the server's --insecure flag
  # via ARGOCD_SERVER_INSECURE.
  #
  # Safe here and nowhere else: this cluster is a throwaway k3d instance reachable
  # only through a 127.0.0.1 port-forward.
  server.insecure: "true"
