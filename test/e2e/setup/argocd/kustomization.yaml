# Argo CD for the bi-directional e2e corner (docs/design/e2e-bi-directional-corner.md).
#
# This is the ONLY place Argo CD is installed. It is applied by the
# `_argocd-installed` Taskfile node, which only `task test-e2e-bi-directional`
# and `task argocd-ui` depend on — so the other e2e legs never pay for it.
#
# `install.yaml` is NOT in this directory: `_argocd-installed` copies these files
# into the cluster stamp dir and curls the pinned upstream release next to them
# (same shape as `_flux-installed` rendering into {{.CS}}/flux-operator). So
# `kustomize build` against THIS directory fails by design — build the stamp copy.
# The pinned tag lives in ARGOCD_VERSION in test/e2e/Taskfile.yml; see README.md.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  - namespace.yaml
  - install.yaml

patches:
  # Trim the full install (7 workloads) down to the 4 needed to sync an
  # Application and serve the web UI. Argo's own `core-install.yaml` is lighter
  # still, but it drops argocd-server — i.e. no UI — so it is not usable here.
  - path: remove-dex.yaml
  - path: remove-notifications.yaml
  - path: remove-applicationset.yaml
  # Configuration.
  - path: argocd-cm.yaml
  - path: argocd-cmd-params-cm.yaml
