# Kubernetes audit webhook bootstrap configuration for k3d e2e.
# This tracked source file is copied into .stamps/cluster/<ctx>/audit/ before
# cluster creation. The mounted .stamps copy is what kube-apiserver reads, and
# hack/e2e/inject-webhook-tls.sh overwrites that generated copy after
# cert-manager issues the final audit TLS materials.
apiVersion: v1
kind: Config
preferences: {}
clusters:
- name: audit-webhook
  cluster:
    server: https://127.0.0.1:30444/audit-webhook/kind-e2e
    insecure-skip-tls-verify: true
contexts:
- name: webhook
  context:
    cluster: audit-webhook
    user: kube-apiserver
current-context: webhook
users:
- name: kube-apiserver
  user: {}
