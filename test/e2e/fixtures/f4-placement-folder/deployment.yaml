# A pre-existing resource in the overlay, proving the folder is already a real
# kustomize context before F4 places anything new in it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: f4-placement-web
  labels:
    app.kubernetes.io/part-of: f4-placement
spec:
  replicas: 1
  selector:
    matchLabels:
      app: f4-placement-web
  template:
    metadata:
      labels:
        app: f4-placement-web
    spec:
      containers:
        - name: web
          image: nginx:1.27
