# docs/style-guide.md -> "Code, identifiers, and names".
#
# `GitOps Reverser` in prose, `gitops-reverser` for the binary, chart, image, and
# namespace. The lowercase form is always backticked and so never reaches this
# rule. `Gitops Reverser` appears zero times today; this keeps it that way.
extends: substitution
message: "Write '%s', not '%s'."
link: https://github.com/ConfigButler/gitops-reverser/blob/main/docs/style-guide.md#code-identifiers-and-names
level: error
ignorecase: false
swap:
  'Gitops Reverser': 'GitOps Reverser'
  'GitOps reverser': 'GitOps Reverser'
  'Git Ops': 'GitOps'
  'kube-API server': 'kube-apiserver'
  'Kube API server': 'kube-apiserver'
