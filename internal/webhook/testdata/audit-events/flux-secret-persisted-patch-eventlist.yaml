kind: EventList
apiVersion: audit.k8s.io/v1
items:
  - kind: Event
    apiVersion: audit.k8s.io/v1
    level: RequestResponse
    auditID: persisted-secret-patch
    stage: ResponseComplete
    requestURI: /api/v1/namespaces/default/secrets/app-secret?fieldManager=kustomize-controller&force=true
    verb: patch
    user:
      username: system:serviceaccount:flux-system:kustomize-controller
    objectRef:
      resource: secrets
      namespace: default
      name: app-secret
      apiVersion: v1
      resourceVersion: "101"
    responseStatus:
      metadata: {}
      code: 200
    requestObject:
      kind: Secret
      apiVersion: v1
      metadata:
        name: app-secret
        namespace: default
        resourceVersion: "101"
    responseObject:
      kind: Secret
      apiVersion: v1
      metadata:
        name: app-secret
        namespace: default
        resourceVersion: "102"
