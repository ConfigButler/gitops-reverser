apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: web
          image: nginx:1.0
          ports:
            - containerPort: 80
          env:
            - name: LOG_LEVEL
              value: info
        - name: sidecar
          image: envoy:1.0
